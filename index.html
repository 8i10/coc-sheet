<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font-sans:'Zen Kaku Gothic New',sans-serif}
.app{max-width:680px;margin:0 auto;font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);background:var(--color-background-tertiary)}
.screen{display:none}.screen.active{display:block}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:500px;padding:2rem}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;width:100%;max-width:340px}
.login-logo{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;justify-content:center}
.login-logo i{font-size:26px;color:#1D9E75}
.login-logo span{font-size:18px;font-weight:500}
.login-card label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;margin-top:10px}
.login-card input{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px}
.login-card input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,0.15)}
.btn-primary{width:100%;margin-top:1.25rem;padding:9px;background:#1D9E75;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer}
.btn-primary:hover{background:#0F6E56}
.err{font-size:11px;color:var(--color-text-danger);margin-top:5px;display:none}
.reg-link{text-align:center;margin-top:0.75rem;font-size:12px;color:var(--color-text-secondary)}
.reg-link a{color:#1D9E75;cursor:pointer}

/* YEAR NAV */
.year-nav{display:flex;align-items:center;gap:2px}
.year-nav-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:4px;width:20px;height:20px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.year-nav-btn:hover{background:rgba(255,255,255,0.4)}
.year-nav-label{font-size:14px;font-weight:600;min-width:40px;text-align:center}

/* TOP HEADER */
.header{position:relative;background:#1D9E75;color:#fff;padding:4px 10px;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:1px 8px;position:sticky;top:0;z-index:20}
.header-col-left{display:flex;flex-direction:column;gap:2px}
.header-col-right{display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.header-row1{display:flex;align-items:center;gap:4px}
.header-row2{display:flex;align-items:center;gap:4px}
.header-updated{font-size:10px;opacity:0.85;white-space:nowrap}
.today-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px}
.header-col-right .today-btn{font-size:10px;padding:2px 5px}
.today-btn:hover{background:rgba(255,255,255,0.35)}
.logout-btn{background:none;border:none;color:rgba(255,255,255,0.85);cursor:pointer;font-size:12px;display:flex;align-items:center}
.avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* STICKY 2ND ROW */
.month-sticky{background:#1D9E75;color:#fff;padding:3px 0;display:flex;align-items:center;position:sticky;top:62px;z-index:19;border-top:1px solid rgba(255,255,255,0.2)}
.month-sticky-label{font-size:13px;font-weight:600;flex:1;padding-left:8px}
/* icons must align exactly with checks-col */
.month-sticky-icons{display:flex;gap:0;width:80px;min-width:80px}
.month-sticky-icons span{flex:1;text-align:center;font-size:12px;line-height:1}

/* MONTH DIVIDER */
.month-divider{background:#1D9E75;color:#fff;padding:3px 8px;font-size:13px;font-weight:600}

/* DAY ROW */
.day-row{border-bottom:0.5px solid rgba(0,0,0,0.20);background:var(--color-background-primary)}
.day-row.unavail{background:var(--color-background-secondary)}
.day-header{display:flex;align-items:stretch;min-height:26px}

/* DATE COLUMN */
.day-num{width:42px;min-width:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 0;gap:0;background:#f5f5f5}
.day-row.sun .day-num,.day-row.holiday .day-num{background:#ffeaea}
.day-row.sat .day-num{background:#eaf0ff}
.day-row.today .day-num{background:#f0f0f0}
.day-row.today .events-col{background:#d4f0e8}
.dnum{font-size:12px;font-weight:700;line-height:1.1;color:#333}
.dwk{font-size:9px;line-height:1.2;color:#777}
.day-row.sun .dnum,.day-row.holiday .dnum{color:#c0392b}
.day-row.sun .dwk,.day-row.holiday .dwk{color:#c0392b}
.day-row.sat .dnum{color:#2563a8}
.day-row.sat .dwk{color:#2563a8}
.day-row.today .dnum{color:#333}
/* green left border only */
.day-num::after{content:'';display:block;position:absolute;left:42px;top:0;bottom:0;width:2px}
.day-row{position:relative}
.day-row::before{content:'';position:absolute;left:42px;top:0;bottom:0;width:2px;background:#1D9E75;z-index:1}
.day-row.past .events-col{background:#e8e8e8}

/* EVENTS COL */
.events-col{flex:1;padding:2px 5px;display:flex;flex-direction:column;gap:1px;min-width:0;padding-left:7px;background:rgba(0,0,0,0.018)}

/* event row: icon | time | cat | title */
.ev-row{display:flex;align-items:center;gap:3px;padding:1px 0;min-height:19px}

.ev-time{font-size:10px;color:var(--color-text-secondary);width:32px;min-width:32px;white-space:nowrap}
.ev-cat{font-size:9px;padding:0 3px;border-radius:5px;font-weight:700;width:22px;min-width:22px;text-align:center;line-height:14px}
.cat-vc{background:#E1F5EE;color:#0F6E56}
.cat-tx{background:#E6F1FB;color:#185FA5}
.cat-vt{background:#FAEEDA;color:#854F0B}
.cat-pl{background:#FBEAF0;color:#993556}
.ev-title{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--color-text-primary)}
.ev-del{opacity:0;background:none;border:none;color:#E24B4A;cursor:pointer;font-size:10px;padding:0 2px}
.ev-row:hover .ev-del{opacity:0.7}

/* user event row (editable) — same layout */
.user-ev-row{display:flex;align-items:center;gap:3px;padding:1px 0;min-height:19px;border-radius:3px}
.user-ev-row:hover{background:rgba(0,0,0,0.03)}
.user-ev-time-sel{font-size:10px;border:none;border-bottom:1px solid transparent;background:transparent;color:var(--color-text-secondary);width:52px;min-width:52px;padding:0;outline:none;cursor:pointer}
.user-ev-row:hover .user-ev-time-sel{border-bottom-color:var(--color-border-secondary)}
.user-ev-time-sel:focus{border-bottom-color:#1D9E75;outline:none}
.user-ev-cat-sel{font-size:9px;border:none;border-bottom:1px solid transparent;background:transparent;padding:0 1px;outline:none;cursor:pointer;width:34px;min-width:34px;font-weight:700;text-align:center}
.user-ev-row:hover .user-ev-cat-sel{border-bottom-color:var(--color-border-secondary)}
.user-ev-cat-sel:focus{border-bottom-color:#1D9E75}
.user-ev-title{flex:1;font-size:11px;border:none;border-bottom:1px solid transparent;background:transparent;color:var(--color-text-primary);padding:0;outline:none;min-width:0;cursor:text}
.user-ev-row:hover .user-ev-title{border-bottom-color:var(--color-border-secondary)}
.user-ev-title::placeholder{color:#bbb;opacity:1}
.user-ev-title:focus{border-bottom-color:#1D9E75}
.user-ev-del{opacity:0;background:none;border:none;color:#E24B4A;cursor:pointer;font-size:10px;padding:0 2px}
.user-ev-row:hover .user-ev-del{opacity:0.7}
.user-ev-del:hover{opacity:1!important}

/* SLOT ROWS — always visible hiru/yoru rows */
.slot-row{display:flex;align-items:flex-start;gap:3px;padding:1px 0;min-height:18px}
.slot-icon{flex-shrink:0;margin-top:3px}
.slot-evs{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.slot-add-btn{background:none;border:none;color:var(--color-text-secondary);opacity:0.4;cursor:pointer;font-size:10px;padding:1px 2px;line-height:1;align-self:flex-start}
.slot-add-btn:hover{opacity:1;color:#1D9E75}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:3px;padding:2px 0 2px 44px;min-height:22px}
.add-icon-sel{display:flex;align-items:center;gap:2px;cursor:pointer;border:none;border-bottom:1px solid var(--color-border-secondary);background:transparent;padding:0 2px;font-size:10px}
.add-time-sel{font-size:10px;border:none;border-bottom:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);width:52px;padding:0;outline:none;cursor:pointer}
.add-time-sel:focus{border-bottom-color:#1D9E75}
.add-cat-sel{font-size:9px;border:none;border-bottom:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);padding:0 1px;outline:none;width:34px;cursor:pointer;font-weight:700}
.add-cat-sel:focus{border-bottom-color:#1D9E75}
.add-title-in{flex:1;font-size:11px;border:none;border-bottom:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);padding:0 2px;outline:none;min-width:0}
.add-title-in:focus{border-bottom-color:#1D9E75}
.add-title-in::placeholder{color:var(--color-text-secondary);opacity:0.5}
.add-confirm{background:#1D9E75;border:none;color:#fff;border-radius:3px;font-size:10px;padding:1px 5px;cursor:pointer}
.add-cancel-btn{background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:10px;padding:0 2px}
.show-add-btn{font-size:10px;color:var(--color-text-secondary);opacity:0.3;cursor:pointer;padding:1px 0;display:flex;align-items:center;gap:2px;border:none;background:none;margin-top:1px}
.show-add-btn:hover{opacity:1;color:#1D9E75}

/* ADD COL — between events-col and checks-col */
.add-col{width:22px;min-width:22px;display:flex;align-items:flex-start;justify-content:center;padding-top:4px}

/* CHECKS COL — fixed 72px, 3 equal slots */
.checks-col{width:80px;min-width:80px;display:flex;flex-direction:column;padding:2px 0;gap:2px}
.memo-input{width:100%;box-sizing:border-box;font-size:10px;font-family:'Zen Kaku Gothic New',sans-serif;border:none;border-bottom:1px solid transparent;background:transparent;padding:1px 2px;outline:none;color:#6D7497;resize:none;line-height:1.4}
.memo-input:hover{background:rgba(0,0,0,0.03)}
.memo-input:focus{background:rgba(0,0,0,0.03);border-bottom-color:#1D9E75}

/* MONTH NOTE */
.month-note-wrap{border-top:1px solid rgba(0,0,0,0.13);background:var(--color-background-primary);padding:3px 8px 3px 50px;display:flex;align-items:flex-start}
.month-note{flex:1;border:none;background:transparent;font-size:11px;color:var(--color-text-secondary);resize:vertical;outline:none;min-height:22px;line-height:1.5;font-family:inherit}
.month-note::placeholder{opacity:0.4}

.ev-icon{width:13px;height:13px;flex-shrink:0;border-radius:50%;display:inline-block;background-size:contain;background-repeat:no-repeat;background-position:center}

/* MEMO PAGE MODAL */
#memoPageModal{display:none;flex-direction:column;background:#f5f6fa;min-height:calc(100vh - 62px)}
#memoPageModal .mp-header{display:none}
#memoPageModal .mp-back{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#memoPageModal .mp-title{font-size:14px;font-weight:600;flex:1}
#memoPageModal .mp-body{flex:1;overflow-y:auto;padding:12px}
#memoPageModal .mp-card{background:#fff;border-radius:8px;margin-bottom:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
#memoPageModal .mp-card-title{font-size:11px;font-weight:600;color:#1D9E75;margin-bottom:6px}
#memoPageModal .mp-card textarea{width:100%;box-sizing:border-box;border:none;background:transparent;font-size:12px;color:#333;font-family:'Zen Kaku Gothic New',sans-serif;line-height:1.7;outline:none;resize:vertical;min-height:60px;border-radius:3px;padding:2px 4px;transition:background 0.1s}
#memoPageModal .mp-card textarea:hover{background:rgba(0,0,0,0.03)}
#memoPageModal .mp-card textarea:focus{background:rgba(0,0,0,0.03)}
#memoPageModal .mp-card textarea::placeholder{color:#ccc}

/* 日程未定テーブル */
.undecided-head{display:flex;align-items:center;gap:3px;padding:4px 6px;background:#1D9E75;border-radius:4px 4px 0 0;margin-top:6px}
.undecided-head span{font-size:11px;font-weight:600;color:#fff;font-family:'Zen Kaku Gothic New',sans-serif;overflow:hidden;white-space:nowrap}
.undecided-head .uh-scenario{flex:3}
.undecided-head .uh-format{flex:0.8;text-align:center}
.undecided-head .uh-kppl{flex:2.8}
.undecided-head /* removed uh-pl */.uh-pl_unused{flex:2.5}
.undecided-head .uh-memo{flex:3.6}
.undecided-head .uh-del{width:12px;flex-shrink:0}
.undecided-row{display:flex;align-items:center;gap:3px;padding:2px 6px;min-height:24px;border-radius:3px;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.undecided-row input{border:none;background:transparent;font-size:10px;font-family:'Zen Kaku Gothic New',sans-serif;color:#666;outline:none;padding:2px 4px;line-height:1.5;min-width:0;border-radius:3px;transition:background 0.1s}
.undecided-row input:hover{background:rgba(0,0,0,0.03)}
.undecided-row input:focus{background:rgba(0,0,0,0.03)}
.undecided-row input::placeholder{color:#ccc}
.undecided-row .ui-scenario{flex:3 1 0}
.undecided-row .ui-format{flex:0.8;font-size:9px;border:none;border-bottom:1px solid transparent;background:transparent;padding:0;outline:none;cursor:pointer;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;color:#333;border-radius:0;-webkit-appearance:none;appearance:none;text-align:center;text-align-last:center}
.undecided-row .ui-format:hover{border-bottom-color:var(--color-border-secondary)}
.undecided-row .ui-format:focus{border-bottom-color:#1D9E75;background:transparent}
.undecided-row .ui-kppl{flex:2.8}
.undecided-row /* removed ui-pl */.ui-pl_unused{flex:2.5}
.undecided-row .ui-memo{flex:3.6 1 0}
.undecided-del-btn{width:12px;flex-shrink:0;background:none;border:none;color:#ddd;cursor:pointer;font-size:9px;padding:0;line-height:1;text-align:right;margin-left:auto}
.undecided-del-btn:hover{color:#e24b4a!important}
.undecided-add-btn{margin-top:4px;background:none;border:1px dashed #ccc;color:#aaa;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;width:100%;font-family:'Zen Kaku Gothic New',sans-serif}
.undecided-add-btn:hover{border-color:#1D9E75;color:#1D9E75}

/* SYNC MODAL */
.sync-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1500;display:flex;align-items:center;justify-content:center}
.sync-modal-card{background:#fff;border-radius:12px;padding:20px 22px;max-width:360px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.sync-modal-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.sync-modal-card p{font-size:11px;color:#666;margin-bottom:12px;line-height:1.6}
.sync-modal-card label{display:block;font-size:11px;color:#555;margin-bottom:3px;margin-top:10px}
.sync-modal-card input{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:12px;box-sizing:border-box}
.sync-status{font-size:11px;margin-top:8px;padding:6px 9px;border-radius:6px;display:none}
.sync-status.ok{background:#e8f8f2;color:#0F6E56;display:block}
.sync-status.err{background:#fdecea;color:#c0392b;display:block}
.sync-modal-btns{display:flex;gap:8px;margin-top:14px}
.sync-modal-btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.sync-btn-cancel{background:#f0f0f0;color:#555}
.sync-btn-ok{background:#1D9E75;color:#fff}
.sync-indicator{font-size:10px;color:rgba(255,255,255,0.75);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* MOBILE */
@media(max-width:480px){
  .app{max-width:100%;font-size:12px}
  .month-sticky-icons{display:none!important}
  /* チェックボックス列を非表示 */
  .chk-wrap{display:none!important}
  [style*="width:72px"]{display:none!important}
  /* memo-col スマホ幅強制 */
  .memo-col{width:80px!important;min-width:80px!important;max-width:80px!important;padding:0 2px!important}
  /* ヘッダー調整 */
  .header-updated{font-size:9px}
  .header{padding:3px 8px;gap:2px}
  /* 日付列を少し狭く */
  .day-num{width:36px;min-width:36px}
  .day-row::before{left:36px}
  .dnum{font-size:11px}
  .dwk{font-size:8px}
  /* events */
  .ev-title{font-size:10px}
  .ev-time{font-size:9px;width:28px;min-width:28px}
  .user-ev-title{font-size:10px!important}
  .user-ev-time-sel{font-size:9px!important;width:30px!important;min-width:30px!important}
  .user-ev-cat-sel{width:24px!important;min-width:24px!important}
  /* スマホ: 入力欄の下線をすべて非表示 */
  .user-ev-time-sel,.user-ev-cat-sel,.user-ev-title,
  .add-time-sel,.add-cat-sel,.add-title-in,
  .memo-input{border-bottom:none!important}
  /* add-col */
  .add-col{display:none!important}
  /* login card */
  .login-card{padding:1.5rem 1.2rem}
  /* シナリオ名とメモ欄の横幅を入れ替え */
  .undecided-head .uh-scenario,.undecided-row .ui-scenario{flex:4.5 1 0!important;min-width:0!important}
  .undecided-head .uh-memo,.undecided-row .ui-memo{flex:1.8 1 0!important;min-width:0!important}
  /* スマホ: 日程未定テーブル */
  .undecided-head{flex-wrap:nowrap!important}
  .undecided-head span{font-size:9px!important}
  .undecided-head .uh-scenario{flex:3 1 0!important}
  .undecided-head .uh-format{flex:0.7!important;text-align:center!important}
  .undecided-head .uh-kppl{flex:2.3 1 0!important}
  .undecided-head .uh-memo{display:none!important}
  .undecided-head .uh-del{display:none!important}
  .undecided-row{flex-wrap:wrap!important;align-items:flex-start!important}
  .undecided-row .ui-scenario{flex:3 1 0!important}
  .undecided-row .ui-format{flex:0.7!important}
  .undecided-row .ui-kppl{flex:2.3 1 0!important}
  .undecided-row .ui-memo{flex:100%!important;padding-left:4px;padding-top:2px;border-top:0.5px solid rgba(0,0,0,0.05);min-width:0!important}
  .undecided-del-btn{font-size:8px!important}
  /* メモページtextarea幅を制限 */
  #memoPageModal .mp-card textarea{max-width:100%;width:100%!important;font-size:11px!important}
  #memoPageModal .mp-body{padding:8px}
  #memoPageModal .mp-card{padding:10px 10px}
}
/* ===== タスク管理ページ ===== */
#taskPageModal{display:none;flex-direction:column;background:#f5f6fa;min-height:calc(100vh - 62px)}
#taskPageModal .tp-header{display:none}
#taskPageModal .tp-back{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}

#taskPageModal .tp-body{flex:1;overflow-y:auto;padding:12px}

.task-scenario{font-size:12px;font-weight:700;color:#222;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.task-note{width:100%;box-sizing:border-box;border:none;border-bottom:1px solid #eee;background:transparent;font-size:11px;color:#555;font-family:'Zen Kaku Gothic New',sans-serif;outline:none;padding:2px 2px;resize:none;line-height:1.5;min-height:20px}
.task-note:focus{border-bottom-color:#1D9E75;background:rgba(0,0,0,0.02)}

.task-empty{text-align:center;color:#bbb;font-size:12px;padding:30px 0}

.tab-btn{position:relative;transition:background 0.15s}
.tab-btn.active{background:rgba(255,255,255,0.35)!important;font-weight:600}

#calPanel{display:none;position:absolute;top:68px;left:0;right:0;min-height:calc(100vh - 68px);z-index:10;flex-direction:column;background:var(--color-background-primary)}

.role-sel{border:none;background:transparent;padding:0;outline:none;cursor:pointer;font-size:9px}

// Time options
const HIRU_TIMES=['13:00','14:00','14:30','15:00'];
const YORU_TIMES=['21:00','21:30','22:00','22:30'];
// All valid user-add times
const ALL_TIMES=[...HIRU_TIMES,...YORU_TIMES];

function isNightTime(t){if(!t)return false;var h=parseInt(t.split(':')[0]);return h>=18||h<6;}
function timeIconSrc(t){return(!t||!isNightTime(t))?HIRU_URI:YORU_URI;}
function timeIconEl(t){const cls=(!t||!isNightTime(t))?'ev-icon ev-icon-hiru':'ev-icon ev-icon-yoru';return '<span class="'+cls+'"></span>';}

// Build <select> options for time — grouped hiru/yoru
function buildTimeOptions(selected){
  let o='<option value="">--</option>';
  o+='<optgroup label="昼">';
  HIRU_TIMES.forEach(t=>{o+=`<option value="${t}"${selected===t?' selected':''}>${t}</option>`;});
  o+='</optgroup><optgroup label="夜">';
  YORU_TIMES.forEach(t=>{o+=`<option value="${t}"${selected===t?' selected':''}>${t}</option>`;});
  o+='</optgroup>';
  return o;
}

// Auto-login
const VIEW_PARAM=(new URLSearchParams(location.search)).get('view');
window.addEventListener('load',function(){
  if(VIEW_PARAM){initViewMode();return;}
  try{var s=JSON.parse(localStorage.getItem('cal_session')||'null');if(s&&s.email&&s.name){currentUser=s.email;loginOk(s.name);}}catch(e){}
});

function updateStickyTop(){
  const hdr=document.querySelector('.header');
  const sticky=document.querySelector('.month-sticky');
  if(hdr&&sticky){sticky.style.top=hdr.offsetHeight+'px';}
}
window.addEventListener('resize',updateStickyTop);
window.addEventListener('load',updateStickyTop);
// スマホ↔PC切り替え時にカレンダー再描画（メモ欄幅を正しく反映）
const mobileQuery=window.matchMedia('(max-width:480px)');
mobileQuery.addEventListener('change',()=>{if(typeof buildCal==='function'&&document.getElementById('calScreen').classList.contains('active'))buildCal();});


var _currentTab='cal';
function showTab(tab){
  if(VIEW_PARAM)return; // 閲覧モードはタブ切り替え不可
  const calBody=document.getElementById('calBody');
  const stickyMonth=document.querySelector('.month-sticky');
  const memoModal=document.getElementById('memoPageModal');
  const taskModal=document.getElementById('taskPageModal');
  const tabTask=document.getElementById('tabTask');
  const tabMemo=document.getElementById('tabMemo');
  const tabCal=document.getElementById('tabCal');
  // Ensure modals are inside calScreen
  const calScreen=document.getElementById('calScreen');
  if(calScreen&&!calScreen.contains(memoModal))calScreen.appendChild(memoModal);
  if(calScreen&&!calScreen.contains(taskModal))calScreen.appendChild(taskModal);
  // Toggle: same tab closes
  if(tab!=='cal'&&tab===_currentTab){tab='cal';}
  _currentTab=tab;
  // reset active state
  if(tabTask)tabTask.classList.remove('active');
  if(tabMemo)tabMemo.classList.remove('active');
  if(tabCal)tabCal.classList.remove('active');
  if(tab==='cal'){
    if(tabCal)tabCal.classList.add('active');
    calBody.style.display='';
    if(stickyMonth)stickyMonth.style.display='';
    memoModal.style.display='none';
    taskModal.style.display='none';
    const tb=document.getElementById('todayBtn');if(tb)tb.style.display='';
  } else if(tab==='memo'){
    if(tabMemo)tabMemo.classList.add('active');
    memoModal.style.display='flex';
    taskModal.style.display='none';
    calBody.style.display='none';
    if(stickyMonth)stickyMonth.style.display='none';
    const tb=document.getElementById('todayBtn');if(tb)tb.style.display='none';
    window.scrollTo(0,0);
    buildMemoPage();
  } else if(tab==='task'){
    if(tabTask)tabTask.classList.add('active');
    taskModal.style.display='flex';
    memoModal.style.display='none';
    calBody.style.display='none';
    if(stickyMonth)stickyMonth.style.display='none';
    const tb=document.getElementById('todayBtn');if(tb)tb.style.display='none';
    window.scrollTo(0,0);
    buildTaskPage();
  }
}

// ===== Gist同期 =====
const SYNC_TOKEN_KEY='cal_sync_token';
const SYNC_DEBOUNCE_MS=3000;
let syncTimer=null;

function getSyncToken(){return localStorage.getItem(SYNC_TOKEN_KEY+':'+currentUser)||''}
function setSyncToken(t){if(t)localStorage.setItem(SYNC_TOKEN_KEY+':'+currentUser,t);else localStorage.removeItem(SYNC_TOKEN_KEY+':'+currentUser)}
function getSyncGistId(){return localStorage.getItem('cal_sync_gist:'+currentUser)||''}
function setSyncGistId(id){if(id)localStorage.setItem('cal_sync_gist:'+currentUser,id);else localStorage.removeItem('cal_sync_gist:'+currentUser)}

function syncKeyForUser(email){return btoa(email).replace(/[^a-zA-Z0-9]/g,'').slice(0,20)}

function setSyncIndicator(state){
  // state: 'ok'|'err'|'syncing'|'none'
  const el=document.getElementById('syncStatus');
  if(!el)return;
  if(state==='none'){el.style.display='none';return;}
  el.style.display='flex';
  if(state==='ok'){el.textContent='☁ 同期済み';el.style.color='#1D9E75';}
  else if(state==='err'){el.textContent='☁ 同期エラー';el.style.color='#e24b4a';}
  else{el.textContent='☁ 同期中…';el.style.color='#888';}
}

function scheduleSyncPush(){
  if(!getSyncToken())return;
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>doSyncPush(false),SYNC_DEBOUNCE_MS);
}

async function doSyncPush(showResult=true){
  const token=getSyncToken();
  if(!token||!currentUser)return;
  const ud=getUserData();
  const users=getUsers();
  // 閲覧GistIDも同期対象に含める
  const viewGistId=localStorage.getItem('cal_view_gist:'+currentUser)||'';
  // パスワードは同期しない（ハッシュ代わりにユーザー名だけ）
  const payload=JSON.stringify({ud,ts:Date.now(),email:currentUser,name:users[currentUser]?.name||''});
  const gistId=getSyncGistId();
  setSyncIndicator('syncing');
  try{
    let newId;
    if(gistId){
      const r=await fetch('https://api.github.com/gists/'+gistId,{
        method:'PATCH',
        headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
        body:JSON.stringify({files:{'trpgcal_data.json':{content:payload}}})
      });
      if(r.status===404){setSyncGistId('');return doSyncPush(showResult);}
      if(!r.ok)throw new Error((await r.json()).message||r.status);
      newId=gistId;
    } else {
      const r=await fetch('https://api.github.com/gists',{
        method:'POST',
        headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
        body:JSON.stringify({public:false,description:'trpgcal:'+currentUser,files:{'trpgcal_data.json':{content:payload}}})
      });
      if(!r.ok)throw new Error((await r.json()).message||r.status);
      newId=(await r.json()).id;
      setSyncGistId(newId);
    }
    setSyncIndicator('ok');
    if(showResult)alert('同期しました');
  }catch(e){
    setSyncIndicator('err');
    if(showResult)alert('同期エラー: '+e.message);
    console.error(e);
  }
}

async function doSyncPull(){
  const token=getSyncToken();
  if(!token||!currentUser)return false;
  // GistリストからtrpgcalのGistを探す（description一致）
  setSyncIndicator('syncing');
  try{
    const r=await fetch('https://api.github.com/gists?per_page=100',{
      headers:{'Authorization':'token '+token}
    });
    if(!r.ok)throw new Error((await r.json()).message||r.status);
    const gists=await r.json();
    const found=gists.find(g=>g.description==='trpgcal:'+currentUser&&g.files['trpgcal_data.json']);
    if(!found){setSyncIndicator('none');return false;}
    setSyncGistId(found.id);
    // Gistの内容を取得
    const r2=await fetch('https://api.github.com/gists/'+found.id,{
      headers:{'Authorization':'token '+token}
    });
    if(!r2.ok)throw new Error((await r2.json()).message||r2.status);
    const data=await r2.json();
    const content=data.files['trpgcal_data.json']?.content;
    if(!content)return false;
    const parsed=JSON.parse(content);
    // ローカルデータより新しければ上書き
    const localTs=parseInt(localStorage.getItem('cal_last_updated_ts_'+currentUser)||'0');
    // viewGistIdはタイムスタンプ問わず常に取り込む（端末間でURLを統一）
    if(parsed.viewGistId&&!localStorage.getItem('cal_view_gist:'+currentUser)){
      localStorage.setItem('cal_view_gist:'+currentUser,parsed.viewGistId);
    }
    if(parsed.ts&&parsed.ts>localTs){
      localStorage.setItem('cal_ud_'+currentUser,JSON.stringify(parsed.ud));
      localStorage.setItem('cal_last_updated_ts_'+currentUser,String(parsed.ts));
    }
    // 同期データのタイムスタンプから最終更新日を表示（別端末でも反映）
    if(parsed.ts){
      const d=new Date(parsed.ts);
      const s=`最終更新: ${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      const el=document.getElementById('headerUpdated');
      if(el)el.textContent=s;
      localStorage.setItem('cal_last_updated:'+currentUser,d.toISOString());
      localStorage.setItem('cal_last_updated_ts_'+currentUser,String(parsed.ts));
    }
    setSyncIndicator('ok');
    return true;
  }catch(e){
    setSyncIndicator('err');
    console.error('sync pull error',e);
    return false;
  }
}

  let modal=document.createElement('div');
  modal.className='sync-modal-overlay';
  modal.innerHTML=`<div class="sync-modal-card">
    <h3>☁ 端末間同期（GitHub Gist）</h3>

      <button class="sync-btn-cancel" onclick="this.closest('.sync-modal-overlay').remove()">閉じる</button>

    </div>
    ${token?`<div style="margin-top:10px;display:flex;gap:8px">
      <button onclick="doSyncPull().then(ok=>{if(ok){buildCal();document.getElementById('syncStatus').textContent='データを取り込みました';document.getElementById('syncStatus').className='sync-status ok'}})" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:11px;cursor:pointer;background:#f0f0f0;color:#333">↓ 最新データを取得</button>
      <button onclick="doSyncPush(true)" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:11px;cursor:pointer;background:#f0f0f0;color:#333">↑ 今すぐ送信</button>
    </div>`:''}
    ${token?`<button onclick="setSyncToken('');setSyncGistId('');setSyncIndicator('none');this.closest('.sync-modal-overlay').remove();alert('同期設定を解除しました')" style="margin-top:8px;width:100%;padding:7px;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;color:#999">同期を解除</button>`:''}
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  setTimeout(()=>document.getElementById('syncTokenInput').focus(),50);
}

async function applySyncToken(){
  const t=document.getElementById('syncTokenInput').value.trim();
  const st=document.getElementById('syncStatus');
  if(!t){st.textContent='Tokenを入力してください';st.className='sync-status err';return;}
  setSyncToken(t);
  setSyncIndicator('syncing');
  st.textContent='接続確認中…';st.className='sync-status ok';
  // Token検証：gistリストを1件取得してみる
  try{
    const r=await fetch('https://api.github.com/gists?per_page=1',{headers:{'Authorization':'token '+t}});
    if(!r.ok)throw new Error((await r.json()).message||r.status);
    // pull → push の順で同期
    await doSyncPull();
    buildCal();
    await doSyncPush(false);
    st.textContent='✓ 同期しました';st.className='sync-status ok';
    setSyncIndicator('ok');
  }catch(e){
    setSyncToken('');setSyncIndicator('none');
    st.textContent='エラー: '+e.message;st.className='sync-status err';
  }
}

  if(!n||!e||p.length<6){err.textContent='すべての項目を正しく入力してください';err.style.display='block';return}
  const u=getUsers();
  if(u[e]){err.textContent='このメールアドレスはすでに登録済みです';err.style.display='block';return}
  u[e]={name:n,pass:p};saveUsers(u);currentUser=e;
  if(t)setSyncToken(t);
  loginOk(n);
}
function doLogin(){
  const e=document.getElementById('loginEmail').value.trim();
  const p=document.getElementById('loginPass').value;
  const t=document.getElementById('loginToken').value.trim();
  const u=getUsers();
  const errEl=document.getElementById('loginErr');
  if(u[e]&&u[e].pass===p){
    currentUser=e;
    if(t)setSyncToken(t);
    loginOk(u[e].name);
  } else {
    if(!u[e]){
      errEl.innerHTML='このアカウントは未登録です。<a onclick="showReg()" style="color:#E24B4A;text-decoration:underline;cursor:pointer">新規登録はこちら</a><br><span style="font-size:10px">※アプリ化直後は再登録が必要です</span>';
    } else {
      errEl.textContent='パスワードが違います';
    }
    errEl.style.display='block';
  }
}
async function loginOk(name){
  if(currentUser)localStorage.setItem('cal_session',JSON.stringify({email:currentUser,name:name}));
  document.getElementById('avatarLabel').textContent=name.charAt(0);
  document.getElementById('loginErr').style.display='none';
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('calScreen').classList.add('active');
  // ユーザーごとのキーで最終更新日を復元（なければ共通キーにフォールバック）
  const savedTs=localStorage.getItem('cal_last_updated:'+currentUser)||localStorage.getItem('cal_last_updated');
  if(savedTs){const d=new Date(savedTs);document.getElementById('headerUpdated').textContent=`最終更新: ${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
  currentYear=new Date().getFullYear();updateYearLabel();
  // Gist同期が設定されていればpullしてからbuildCal
  if(getSyncToken()){
    setSyncIndicator('syncing');
    await doSyncPull();
    setSyncIndicator('ok');
  }
  buildCal();
  const tabCal=document.getElementById('tabCal');if(tabCal)tabCal.classList.add('active');
  setTimeout(scrollToToday,100);
}
function doLogout(){

  document.getElementById('loginScreen').classList.add('active');

}

/* ===== BUILD ===== */
function buildCal(){
  const ud=getUserData();
  const startDate=new Date(currentYear,0,1);
  const endDate=new Date(currentYear,11,31);
  updateYearLabel();
  let html='';
  let prevMonth=-1;
  let prevMonthKey='';
  let cur=new Date(startDate);
  while(cur<=endDate){
    const m=cur.getMonth();
    const y=cur.getFullYear();
    const monthKey=`${y}-${pad(m+1)}`;
    if(m!==prevMonth){
      if(prevMonthKey){
        const nv=(ud['note_'+prevMonthKey]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        html+=`<div class="month-note-wrap"><textarea class="month-note" placeholder="月メモ…" data-mkey="${prevMonthKey}" data-notekey="${prevMonthKey}">${nv}</textarea></div>`;
      }
      html+=`<div class="month-divider" data-month="${monthKey}">${y}年 ${MONTH_JP[m]}</div>`;
      prevMonth=m;prevMonthKey=monthKey;
    }
    const key=ymd(cur);
    const dow=cur.getDay();
    const isHol=!!HOLIDAYS[key];
    const serial=Math.round((cur-SERIAL_ORIGIN)/86400000);
    const unavail=UNAVAIL_SERIALS.has(serial);
    const isToday=key===TODAY;
    const isPast=key<TODAY;
    let cls='day-row';
    if(dow===0||isHol)cls+=' sun';
    else if(dow===6)cls+=' sat';
    if(isHol)cls+=' holiday';
    if(unavail)cls+=' unavail';
    if(isToday)cls+=' today';
    if(isPast)cls+=' past';

    const userEvs=(ud['ev_'+key])||[];
    const memos=ud['memo_'+key]||{};

    // 昼・夜に分類（時刻があればisNightTime、なければslotフィールドで判定）
    const hiruEvs=[];const yoruEvs=[];
    userEvs.forEach((ev,ui)=>{
      // 空エントリ（time/title/catが全て空）はスキップ（仮行として別途表示）
      if(!ev.time&&!ev.title&&!ev.cat)return;
      // slotが未設定で時刻がある場合はslotを補完して保存
      if(!ev.slot&&ev.time){ev.slot=isNightTime(ev.time)?'yoru':'hiru';}
      const isYoru=ev.time?isNightTime(ev.time):(ev.slot==='yoru');
      if(isYoru)yoruEvs.push({...ev,_ui:ui});
      else hiruEvs.push({...ev,_ui:ui});
    });
    // 昼・夜それぞれ最低1行（既存データがない場合のみ仮行を表示用に作成、保存はしない）
    const hiruRows=hiruEvs.length>0?hiruEvs:[{time:'',cat:'',title:'',_ui:-1,_virt:true,_slot:'hiru'}];
    const yoruRows=yoruEvs.length>0?yoruEvs:[{time:'',cat:'',title:'',_ui:-2,_virt:true,_slot:'yoru'}];

    function renderRoleSel(role, evkey, ui){
      const r=role||'';
      const iconHtml=r==='kp'?`<img src="${KP_URI}" style="width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0;pointer-events:none">`
                   :r==='pl'?`<img src="${PL_URI}" style="width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0;pointer-events:none">`
                   :'<span style="width:14px;height:14px;font-size:9px;color:#bbb;display:flex;align-items:center;justify-content:center;flex-shrink:0;pointer-events:none">–</span>';
      return '<span style="position:relative;display:inline-flex;align-items:center;flex-shrink:0;width:14px;height:14px">'
           + iconHtml
           + '<select class="role-sel" data-field="role" data-evkey="'+evkey+'" data-ui="'+ui+'" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">'
           + '<option value="">–</option>'
           + '<option value="kp"'+(r==='kp'?' selected':'')+'>KP</option>'
           + '<option value="pl"'+(r==='pl'?' selected':'')+'>PL</option>'
           + '</select></span>';
    }
    function renderSlotEvRow(ev, slottype){
      const ui=ev._ui;
      const isVirt=ev._virt||false;
      const catVal=ev.cat||'';
      const catCls=catVal?`user-ev-cat-sel ev-cat cat-${catVal}`:'user-ev-cat-sel ev-cat';
      const catOpts='<option value="">-</option><option value="vc"'+(catVal==='vc'?' selected':'')+'>VC</option><option value="tx"'+(catVal==='tx'?' selected':'')+'>TX</option><option value="vt"'+(catVal==='vt'?' selected':'')+'>VT</option>';
      const titleSafe=(ev.title||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      const iconCls=(slottype==='yoru')?'ev-icon ev-icon-yoru':'ev-icon ev-icon-hiru';
      const times=slottype==='yoru'?YORU_TIMES:HIRU_TIMES;
      let timeOpts='<option value="">--:--</option>';
      times.forEach(t=>{timeOpts+=`<option value="${t}"${ev.time===t?' selected':''}>${t}</option>`;});
      // 仮行は data-virt 属性を付けて保存前に実エントリを作る
      const virtAttr=isVirt?` data-virt="${slottype}"`:'';
      const evuiAttr=isVirt?` data-evui=""`:`data-evui="${ui}"`;
      const delHtml=(!isVirt&&(ev.time||ev.title||ev.cat))?` <button class="user-ev-del" data-del="1">✕</button>`:'';
      return `<div class="user-ev-row" data-evkey="${key}" ${evuiAttr}${virtAttr} style="display:flex;align-items:center;min-height:20px">
        <span class="${iconCls}"></span>
        <select class="user-ev-time-sel" data-field="time" style="color:var(--color-text-secondary);font-size:10px;border:none;border-bottom:1px solid transparent;background:transparent;padding:0;outline:none;cursor:pointer;width:36px;min-width:36px;-webkit-appearance:none;appearance:none">${timeOpts}</select>
        <select class="${catCls}" data-field="cat" style="-webkit-appearance:none;appearance:none">${catOpts}</select>
        ${renderRoleSel(ev.role,key,ui)}
        <input class="user-ev-title" type="text" value="${titleSafe}" data-field="title" placeholder="" style="flex:1;font-family:'Zen Kaku Gothic New',sans-serif;font-size:11px;border:none;border-bottom:1px solid transparent;background:transparent;color:var(--color-text-primary);padding:0;outline:none;min-width:0;cursor:text">
        ${delHtml}
      </div>`;
    }

    // チェックボックス列（右端72px固定、events-colの外に置く）
    // 昼・夜それぞれ最初の実行エントリのインデックス
    const hiruUi=(hiruEvs[0])?hiruEvs[0]._ui:-1;
    const yoruUi=(yoruEvs[0])?yoruEvs[0]._ui:-1;
    function renderMemoCol(slotKey){
      const val=(memos[slotKey]||'').replace(/"/g,'&quot;');
      return `<input type="text" class="memo-input" value="${val}" data-memokey="${key}" data-memoslot="${slotKey}" placeholder="">`;
    }

    const isMobile=window.matchMedia('(max-width:480px)').matches;
    const memoColStyle=isMobile?'width:80px;min-width:80px;padding:0 2px':'width:160px;min-width:160px;padding:0 2px';

    let evHtml='';
    // 昼行
    const hiruEv=hiruRows[0];
    evHtml+=`<div style="display:flex;align-items:center">`;
    evHtml+=`<div style="flex:1;min-width:0">${renderSlotEvRow(hiruEv,'hiru')}`;
    if(hiruEvs.length>1) hiruEvs.slice(1).forEach(ev=>{evHtml+=renderSlotEvRow(ev,'hiru');});
    if(hiruEvs.length>0&&(hiruEvs[hiruEvs.length-1].time||hiruEvs[hiruEvs.length-1].title))
      evHtml+=`<button class="slot-add-btn" data-slotkey="${key}" data-slottype="hiru"><i class="ti ti-plus" style="font-size:9px"></i></button>`;
    evHtml+=`</div>`;
    evHtml+=`<div class="memo-col" style="${memoColStyle}">${renderMemoCol('hiru')}</div>`;
    evHtml+=`</div>`;
    evHtml+=`<div style="border-top:0.5px dotted rgba(0,0,0,0.07);margin:1px 0"></div>`;
    // 夜行
    const yoruEv=yoruRows[0];
    evHtml+=`<div style="display:flex;align-items:center">`;
    evHtml+=`<div style="flex:1;min-width:0">${renderSlotEvRow(yoruEv,'yoru')}`;
    if(yoruEvs.length>1) yoruEvs.slice(1).forEach(ev=>{evHtml+=renderSlotEvRow(ev,'yoru');});
    if(yoruEvs.length>0&&(yoruEvs[yoruEvs.length-1].time||yoruEvs[yoruEvs.length-1].title))
      evHtml+=`<button class="slot-add-btn" data-slotkey="${key}" data-slottype="yoru"><i class="ti ti-plus" style="font-size:9px"></i></button>`;
    evHtml+=`</div>`;
    evHtml+=`<div class="memo-col" style="${memoColStyle}">${renderMemoCol('yoru')}</div>`;
    evHtml+=`</div>`;

    html+=`<div class="${cls}" id="day-${key}">
      <div class="day-header">
        <div class="day-num"><span class="dnum">${cur.getDate()}</span><span class="dwk">${DOW[dow]}</span></div>
        <div class="events-col">${evHtml}</div>
      </div>
      <div class="add-row" id="addrow-${key}" style="display:none">
        <span class="ev-icon ev-icon-hiru" id="add-icon-${key}"></span>
        <select class="add-time-sel" id="at-${key}" data-addicon="${key}">
          ${buildTimeOptions('')}
        </select>
        <select class="add-cat-sel" id="ac-${key}">
          <option value="">--</option>
          <option value="vc">VC</option>
          <option value="tx">TX</option>
          <option value="vt">VT</option>
        </select>
        <input class="add-title-in" type="text" id="atl-${key}" placeholder="タイトル…" data-addinput="${key}">
        <button class="add-confirm" data-addconfirm="${key}">追加</button>
        <button class="add-cancel-btn" data-addcancel="${key}">✕</button>
      </div>
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  if(prevMonthKey){
    const nv=(ud['note_'+prevMonthKey]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    html+=`<div class="month-note-wrap"><textarea class="month-note" placeholder="月メモ…" data-mkey="${prevMonthKey}" data-notekey="${prevMonthKey}">${nv}</textarea></div>`;
  }
  document.getElementById('calBody').innerHTML=html;
  setupScrollSpy();
  document.querySelectorAll('.month-note').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  updateStickyTop();
  // 最初のmonth-dividerテキストでstickyMonthを初期化（先頭では二重にならないよう）
  const firstDiv=document.querySelector('.month-divider');
  if(firstDiv)document.getElementById('stickyMonth').textContent=firstDiv.textContent;
}

// ===== Event delegation (全インタラクション) =====
document.addEventListener('DOMContentLoaded', function(){
  // クリック全般
  document.addEventListener('click', function(e){
    if(VIEW_PARAM)return; // 閲覧モードは編集不可
    const t = e.target;

    // ＋ボタン（アイコンの子要素クリック対応で parentElement もチェック）
    const addBtn = t.closest('.show-add-btn');
    if(addBtn){
      showAddRow(addBtn.dataset.addkey); return;
    }
    // 追加確定
    const confirmBtn = t.closest('[data-addconfirm]');
    if(confirmBtn){ confirmAdd(confirmBtn.dataset.addconfirm); return; }
    // 追加キャンセル
    const cancelBtn = t.closest('[data-addcancel]');
    if(cancelBtn){ cancelAdd(cancelBtn.dataset.addcancel); return; }
    // スロット追加ボタン（昼/夜直接追加）
    const slotAddBtn = t.closest('.slot-add-btn');
    if(slotAddBtn){
      const skey=slotAddBtn.dataset.slotkey;
      const stype=slotAddBtn.dataset.slottype;
      addSlotEv(skey,stype); return;
    }
    // ユーザー予定削除
    const delBtn = t.closest('[data-del]');
    if(delBtn){
      const row = delBtn.closest('.user-ev-row');
      if(row) deleteUserEv(row.dataset.evkey, parseInt(row.dataset.evui));
      return;
    }
  });

  // change全般
  document.addEventListener('change', function(e){
    if(VIEW_PARAM)return;
    const t = e.target;
    // KP/PLロール選択
    if(t.classList.contains('role-sel')){
      const evkey=t.dataset.evkey;
      const ui=parseInt(t.dataset.ui);
      const newRole=t.value;
      const ud=getUserData();
      if(!isNaN(ui)&&ui>=0&&ud['ev_'+evkey]&&ud['ev_'+evkey][ui]){
        ud['ev_'+evkey][ui].role=newRole;
        saveUserData(ud);touchUpdated();buildCal();
      }
      return;
    }
    // チェックボックス
    if(t.dataset.memokey){
      saveMemo(t.dataset.memokey, t.dataset.memoslot, t.value); return;
    }
    // 月メモ
    if(t.dataset.notekey){
      saveNote(t.dataset.notekey, t.value); return;
    }
    // 追加フォーム時刻
    if(t.dataset.addicon){
      updateAddIcon(t.dataset.addicon); return;
    }
    // ユーザー予定編集（select）
    const row = t.closest('.user-ev-row');
    if(row){
      const key = row.dataset.evkey;
      const field = t.dataset.field;
      // 仮行の場合は新規エントリを作成してから更新
      if(row.dataset.virt){
        const slottype=row.dataset.virt;
        const ud=getUserData();
        if(!ud['ev_'+key])ud['ev_'+key]=[];
        const newEntry={time:'',cat:'',title:'',slot:slottype};
        newEntry[field]=t.value;
        // timeが設定された場合はslotを更新
        if(field==='time')newEntry.slot=(!t.value||!isNightTime(t.value))?'hiru':'yoru';
        ud['ev_'+key].push(newEntry);
        saveUserData(ud);touchUpdated();buildCal();
        return;
      }
      const ui = parseInt(row.dataset.evui);
      if(isNaN(ui))return;
      if(field === 'cat') updateUserEvCat(key, ui, t);
      else if(field) updateUserEv(key, ui, field, t.value);
    }
  });

  // input（テキスト入力）
  document.addEventListener('input', function(e){
    if(VIEW_PARAM)return;
    const t = e.target;
    const row = t.closest('.user-ev-row');
    if(row && t.dataset.field === 'title'){
      // 仮行の場合は新規エントリを作成
      if(row.dataset.virt){
        // blurで保存するため入力中は保存しない（buildCalしない）
        return;
      }
      const ui=parseInt(row.dataset.evui);
      if(!isNaN(ui))updateUserEv(row.dataset.evkey, ui, 'title', t.value);
    }
  });

  // keydown（Enter/Escape）
  document.addEventListener('keydown', function(e){
    if(e.target.dataset.addinput){
      addRowKey(e, e.target.dataset.addinput);
    }
  });

  // blur（仮行のタイトル入力で保存）
  document.addEventListener('focusout', function(e){
    const t = e.target;
    if(t.dataset.field !== 'title') return;
    const row = t.closest('.user-ev-row');
    if(row && row.dataset.virt && t.value.trim()){
      const key = row.dataset.evkey;
      const slot = row.dataset.virt; // 'hiru' or 'yoru'
      const ud=getUserData();
      if(!ud['ev_'+key])ud['ev_'+key]=[];
      ud['ev_'+key].push({time:'',cat:'',title:t.value.trim(),slot:slot});
      saveUserData(ud);touchUpdated();buildCal();
    }
  });
});

function setupScrollSpy(){
  const dividers=document.querySelectorAll('.month-divider');
  const stickyEl=document.querySelector('.month-sticky');

  function updateSticky(){
    const all=Array.from(document.querySelectorAll('.month-divider'));
    if(!stickyEl||all.length===0)return;
    const stickyBottom=stickyEl.getBoundingClientRect().bottom;
    // 最初のdividerがまだ画面内にある間はstickyを隠す
    const firstRect=all[0].getBoundingClientRect();
    const firstVisible=(firstRect.top<stickyBottom+4&&firstRect.bottom>62);
    stickyEl.style.height=firstVisible?'0':'';
    stickyEl.style.overflow=firstVisible?'hidden':'';
    stickyEl.style.borderTop=firstVisible?'none':'';
    stickyEl.style.opacity=firstVisible?'0':'1';
    stickyEl.style.pointerEvents=firstVisible?'none':'auto';
    // 現在の月を更新
    let current=null;
    for(const d of all){
      const rect=d.getBoundingClientRect();
      if(rect.top<=stickyBottom+2)current=d;
      else break;
    }
    if(current)document.getElementById('stickyMonth').textContent=current.textContent;
  }

  window.addEventListener('scroll',updateSticky,{passive:true});
  updateSticky();

  const obs=new IntersectionObserver(()=>updateSticky(),{threshold:[0,0.1,1]});
  dividers.forEach(d=>obs.observe(d));
}

      <span class="uh-scenario" style="flex:${scFlex};min-width:0">シナリオ</span>
      <span class="uh-format">形式</span>

      <span class="uh-del"></span>
    </div>
    <div id="undecidedRows">${rowsHtml}</div>
    <button class="undecided-add-btn" onclick="addUndecidedRow()">＋ 行追加</button>
  </div>`;

  // ── フリーメモ ──
  const freeMemo=ud['free_memo']||'';
  html+=`<div class="mp-card">

    <textarea placeholder="自由にメモできます…" oninput="saveFreeM(this.value)">${freeMemo.replace(/</g,'&lt;')}</textarea>
  </div>`;

  // 月メモ
  noteKeys.forEach(k=>{
    const val=ud[k]||'';
    if(!val)return;
    const mk=k.replace('note_','');
    const label=mk.replace('-','年')+'月';
    html+=`<div class="mp-card">
      <div class="mp-card-title">${label} 月メモ</div>
      <textarea oninput="saveMemoPage('${k}',this.value)">${val.replace(/</g,'&lt;')}</textarea>
    </div>`;
  });

  // 日付メモ
  memoKeys.forEach(k=>{
    const obj=ud[k]||{};

// カレンダーからシナリオ名を収集（同名は初日のみ・未来or今日のみ）
function collectScenarios(){
  const ud=getUserData();
  // ev_YYYY-MM-DD のキー全取得、ソート
  const evKeys=Object.keys(ud).filter(k=>/^ev_\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  const seen=new Set();
  const result=[];
  evKeys.forEach(k=>{
    const dateStr=k.replace('ev_','');
    // 過去日は自動削除（今日より前）
    if(dateStr<TODAY)return;
    const evs=ud[k]||[];
    evs.forEach(ev=>{
      const title=(ev.title||'').trim();
      if(!title)return;
      if(seen.has(title))return;
      seen.add(title);
      result.push({title,date:dateStr,cat:ev.cat||'',role:ev.role||''});
    });
  });
  return result;
}

function buildTaskPage(){
  const ud=getUserData();
  // 過去日のタスクを自動削除
  const tasks=ud['tasks']||{};
  let changed=false;
  Object.keys(tasks).forEach(title=>{
    const t=tasks[title];
    if(t.date && t.date<TODAY){delete tasks[title];changed=true;}
  });
  if(changed){ud['tasks']=tasks;saveUserData(ud);}

  const scenarios=collectScenarios();

  // 現在のタスクに存在しないシナリオのtasksエントリも整理（任意）
  const body=document.getElementById('taskPageBody');
  if(scenarios.length===0){
    body.innerHTML='<div class="task-empty">カレンダーに今後の予定がありません</div>';
    return;
  }

  let html='<div style="font-size:10px;color:#aaa;margin-bottom:8px;padding:0 2px">カレンダーのシナリオ名から自動生成（同一シナリオは初日のみ・過去日は自動除去）</div>';
  scenarios.forEach(({title,date,cat,role})=>{
    const key=title; // タスクキーはシナリオ名
    const t=tasks[key]||{heya:false,cs:false,tachie:false,note:'',date:date};
    // dateを最新に更新
    if(!tasks[key])tasks[key]={heya:false,cs:false,tachie:false,note:'',date:date};

    const titleSafe=title.replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const noteSafe=(t.note||'').replace(/</g,'&lt;');

    const roleIcon=role==='kp'?`<img src="${KP_URI}" style="width:16px;height:16px;object-fit:contain;border-radius:2px;flex-shrink:0;margin-right:3px">`
                  :role==='pl'?`<img src="${PL_URI}" style="width:16px;height:16px;object-fit:contain;border-radius:2px;flex-shrink:0;margin-right:3px">`
                  :'';

// ===== スプレッドシートから予定を取り込む =====
// スプレッドシート構造（画像確認済み）:
// 1日 = 2行
// 1行目: B列=日付(数字), C列=曜日, E列=時刻1, G列=カテゴリ1, H列=タイトル1
// 2行目: E列=時刻2, G列=カテゴリ2, H列=タイトル2（B,C列は空）
// 列インデックス(0始まり): A=0,B=1,C=2,D=3,E=4,F=5,G=6,H=7

// 時刻小数→"HH:MM"変換
function timeValToStr(val){
  if(val===null||val===undefined||val==='')return'';
  const s=String(val).trim();
  // 文字列の時刻形式 "21:30" or "9:30"
  if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(s))return s.substring(0,5).padStart(5,'0');
  const num=parseFloat(s);
  if(!isNaN(num)&&num>=0&&num<1){
    const mins=Math.round(num*1440);
    return String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
  }
  return'';
}

// シリアル値または日付文字列→"YYYY-MM-DD"
function cellToDateKey(val){
  if(val===null||val===undefined||val==='')return null;
  const num=Number(val);
  if(!isNaN(num)&&num>40000&&num<70000){
    const d=new Date(SERIAL_ORIGIN);d.setDate(d.getDate()+Math.round(num));
    return ymd(d);
  }
  const s=String(val).trim();
  const m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return null;
}

// XLSXファイルから取り込み
function importFromXlsx(input){
  const file=input.files[0];
  if(!file){return;}
  input.value='';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true,dense:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const count=importSheetRows(ws);
      alert(`${count}件の予定を取り込みました。`);
    }catch(err){
      alert('取込エラー: '+err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// スプレッドシートURL（pubhtml or 直接xlsx URL）から取り込み
async function importFromSpreadsheetUrl(){
  const url=prompt(
    'URLを入力してください\n\n' +
    '① Googleスプレッドシート: 「ファイル→共有→ウェブに公開」のURL\n' +
    '② 公開xlsxの直接URL（GitHub Raw等）: そのままURLを貼り付け'
  );
  if(!url||!url.trim())return;
  try{
    let fetchUrl=url.trim();
    // Googleスプレッドシートの場合はxlsxダウンロードURLに変換
    if(fetchUrl.includes('docs.google.com')||fetchUrl.includes('spreadsheets')){
      const gidMatch=fetchUrl.match(/[?&]gid=(\d+)/);
      const gid=gidMatch?gidMatch[1]:null;
      fetchUrl=fetchUrl.replace(/\/pubhtml(\?.*)?$/,'/pub');
      fetchUrl+=((fetchUrl.includes('?')?'&':'?')+'output=xlsx');
      if(gid&&!fetchUrl.includes('gid='))fetchUrl+='&gid='+gid;
    }
    const res=await fetch(fetchUrl);
    if(!res.ok)throw new Error('取得失敗('+res.status+'): URLが公開されているか確認してください');
    const buf=await res.arrayBuffer();
    const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true,dense:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const count=importSheetRows(ws);
    alert(`${count}件の予定を取り込みました。`);
  }catch(err){
    alert('取込エラー: '+err.message);
    console.error(err);
  }
}

// 実際の取込処理
// raw:true で読むとB列の計算済みシリアル値が数値で取得できる
// B列が日付シリアル値(数値)の行=日付行、そうでない行=続き行(同日付)
function importSheetRows(ws){
  let importCount=0;
  const ud=getUserData();
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  let currentKey=null;

  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    if(!row)continue;
    const bVal=row[1];
    // B列が日付シリアル値なら日付キーを更新
    if(typeof bVal==='number'&&bVal>40000&&bVal<80000){
      currentKey=ymd(serialToDate(Math.round(bVal)));
    }
    if(!currentKey)continue;
    const eVal=row[4],gVal=row[6],hVal=row[7];
    if(!hVal)continue;
    const titleStr=String(hVal).trim();
    if(!titleStr)continue;
    let timeStr='';
    if(typeof eVal==='number'&&eVal>=0&&eVal<1){
      const mins=Math.round(eVal*1440);
      timeStr=String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
    }else if(typeof eVal==='string'){
      const m=eVal.match(/^(\d{1,2}):(\d{2})/);
      if(m)timeStr=m[1].padStart(2,'0')+':'+m[2];
    }
    const catStr=gVal?String(gVal).trim().toLowerCase():'';
    const validCat=['vc','tx','vt','pl'].includes(catStr)?catStr:'';
    if(!ud['ev_'+currentKey])ud['ev_'+currentKey]=[];
    const dup=ud['ev_'+currentKey].some(ex=>ex.title===titleStr&&ex.time===timeStr);
    if(!dup){ud['ev_'+currentKey].push({time:timeStr,cat:validCat,title:titleStr});importCount++;}
  }

  saveUserData(ud);touchUpdated();buildCal();
  return importCount;
}

async function doPublish(token){
  // 同期設定がある場合、最新データをpullしてからpublish（スマホでローカルが空でも上書きしない）
  const syncToken=getSyncToken();
  if(syncToken){
    try{setSyncIndicator('syncing');await doSyncPull();setSyncIndicator('ok');}
    catch(e){}
  }
  const ud=getUserData();
  const payload=JSON.stringify({ud,ts:Date.now()});
  // GistIDはlocalStorage + 同期で端末間共有
  const existingId=localStorage.getItem('cal_view_gist:'+currentUser)||ud['_view_gist_id']||null;
  try{
    let gistId;
    if(existingId){
      const r=await fetch('https://api.github.com/gists/'+existingId,{
        method:'PATCH',
        headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
        body:JSON.stringify({files:{'calendar.json':{content:payload}}})
      });
      if(r.status===404){
        localStorage.removeItem('cal_view_gist:'+currentUser);
        return doPublish(token);
      }
      if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
      gistId=existingId;
    } else {
      const r=await fetch('https://api.github.com/gists',{
        method:'POST',
        headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
        body:JSON.stringify({public:false,description:'calendar data',files:{'calendar.json':{content:payload}}})
      });
      if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
      const data=await r.json();
      gistId=data.id;
      // GistIDをlocalStorageに保存
      localStorage.setItem('cal_view_gist:'+currentUser,gistId);
      // 同期設定があれば即pushして他端末にも反映
      if(syncToken){try{await doSyncPush(false);}catch(e){}}
    }
    const url=location.origin+location.pathname+'?view='+gistId;
    await navigator.clipboard.writeText(url).catch(()=>{});
    showShareModal(url);
  }catch(e){
    // トークンエラーは再入力を促す
    if(e.message&&(e.message.includes('Bad credentials')||e.message.includes('Resource not accessible'))){
      localStorage.removeItem(GIST_TOKEN_KEY);
      showTokenModal(t=>doPublish(t));
      // モーダルにエラーを表示
      setTimeout(()=>{
        const err=document.getElementById('tokenErr');
        if(err){err.textContent='⚠️ '+e.message+'  Classic tokenのgistスコープを確認してください';err.style.display='block';}
      },100);
      return;
    }
    alert('エラー: '+e.message);
  }
}

async function publishView(){
  const token=getGistToken();
  if(!token){showTokenModal(t=>doPublish(t));}
  else{doPublish(token);}
}

function showShareModal(url){
  let modal=document.getElementById('shareModal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='shareModal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;display:flex;align-items:center;justify-content:center';
    modal.innerHTML=`<div style="background:#fff;border-radius:12px;padding:20px 24px;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">閲覧用URLを発行しました</div>
      <div style="font-size:11px;color:#555;margin-bottom:10px">このURLを共有すると、ログイン不要で予定を閲覧できます。<br>予定を更新したら再度「🔗共有」を押してください。</div>
      <input id="shareUrl" type="text" readonly style="width:100%;font-size:11px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;color:#222;background:#f9f9f9">
      <button onclick="copyShareUrl()" style="margin-top:8px;width:100%;padding:7px;background:#1D9E75;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">URLをコピー</button>
      <button onclick="document.getElementById('shareModal').style.display='none'" style="margin-top:6px;width:100%;padding:7px;background:#f0f0f0;color:#555;border:none;border-radius:6px;font-size:12px;cursor:pointer">閉じる</button>
    </div>`;
    document.body.appendChild(modal);
  }
  modal.style.display='flex';
  document.getElementById('shareUrl').value=url;
}
function copyShareUrl(){
  const inp=document.getElementById('shareUrl');
  inp.select();
  navigator.clipboard.writeText(inp.value).catch(()=>document.execCommand('copy'));
  const btn=inp.nextElementSibling;
  btn.textContent='コピーしました ✓';
  setTimeout(()=>{btn.textContent='URLをコピー';},2000);
}

// 閲覧専用buildCal（編集UI・チェックボックス・追加ボタンなし）
function buildCalView(ud){
  const startDate=new Date(currentYear,0,1);
  const endDate=new Date(currentYear,11,31);
  updateYearLabel();
  let html='';
  let prevMonth=-1;let prevMonthKey='';
  let cur=new Date(startDate);
  while(cur<=endDate){
    const m=cur.getMonth();const y=cur.getFullYear();
    const monthKey=`${y}-${pad(m+1)}`;
    if(m!==prevMonth){
      if(prevMonthKey){
        const nv=(ud['note_'+prevMonthKey]||'');
        if(nv)html+=`<div class="month-note-wrap"><div style="flex:1;font-size:11px;color:var(--color-text-secondary);padding:3px 0;white-space:pre-wrap">${nv.replace(/</g,'&lt;')}</div></div>`;
      }
      html+=`<div class="month-divider" data-month="${monthKey}">${y}年 ${MONTH_JP[m]}</div>`;
      prevMonth=m;prevMonthKey=monthKey;
    }
    const key=ymd(cur);
    const dow=cur.getDay();
    const isHol=!!HOLIDAYS[key];
    const serial=Math.round((cur-SERIAL_ORIGIN)/86400000);
    const unavail=UNAVAIL_SERIALS.has(serial);
    const isToday=key===TODAY;
    const isPast=key<TODAY;
    let cls='day-row';
    if(dow===0||isHol)cls+=' sun';
    else if(dow===6)cls+=' sat';
    if(isHol)cls+=' holiday';
    if(unavail)cls+=' unavail';
    if(isToday)cls+=' today';
    if(isPast)cls+=' past';

    const userEvs=(ud['ev_'+key])||[];
    const hiruEvs=[];const yoruEvs=[];
    userEvs.forEach(ev=>{
      if(!ev.time&&!ev.title&&!ev.cat)return;
      const isYoru=ev.time?isNightTime(ev.time):(ev.slot==='yoru');
      if(isYoru)yoruEvs.push(ev);
      else hiruEvs.push(ev);
    });

    function viewRow(ev,slottype){
      const catVal=ev.cat||'';
      const catCls=catVal?`ev-cat cat-${catVal}`:'ev-cat';
      const iconCls=slottype==='yoru'?'ev-icon ev-icon-yoru':'ev-icon ev-icon-hiru';
      const catLabel=catVal?`<span class="${catCls}" style="font-size:9px;padding:0 3px;border-radius:5px;font-weight:700;width:22px;min-width:22px;text-align:center;line-height:14px">${catVal.toUpperCase()}</span>`:'<span style="width:22px;min-width:22px;display:inline-block"></span>';
      const roleHtml=(ev.role==='kp')?`<img src="${KP_URI}" style="width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0">`
                    :(ev.role==='pl')?`<img src="${PL_URI}" style="width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0">`
                    :'<span style="width:14px;height:14px;flex-shrink:0"></span>';
      return `<div style="display:flex;align-items:center;gap:3px;padding:1px 0;min-height:19px">
        <span class="${iconCls}"></span>
        <span style="font-size:10px;color:var(--color-text-secondary);width:32px;min-width:32px">${ev.time||''}</span>
        ${catLabel}
        ${roleHtml}
        <span style="flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(ev.title||'').replace(/</g,'&lt;')}</span>
      </div>`;
    }

    const emptyHiru=`<div style="display:flex;align-items:center;gap:3px;padding:1px 0;min-height:19px"><span class="ev-icon ev-icon-hiru"></span></div>`;
    const emptyYoru=`<div style="display:flex;align-items:center;gap:3px;padding:1px 0;min-height:19px"><span class="ev-icon ev-icon-yoru"></span></div>`;
    const hiruHtml=hiruEvs.length>0?hiruEvs.map(ev=>viewRow(ev,'hiru')).join(''):emptyHiru;
    const yoruHtml=yoruEvs.length>0?yoruEvs.map(ev=>viewRow(ev,'yoru')).join(''):emptyYoru;
    const divider=`<div style="border-top:0.5px dotted rgba(0,0,0,0.07);margin:1px 0"></div>`;

    html+=`<div class="${cls}" id="day-${key}">
      <div class="day-header">
        <div class="day-num"><span class="dnum">${cur.getDate()}</span><span class="dwk">${DOW[dow]}</span></div>
        <div class="events-col">${hiruHtml}${divider}${yoruHtml}</div>
      </div>
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  if(prevMonthKey){
    const nv=(ud['note_'+prevMonthKey]||'');
    if(nv)html+=`<div class="month-note-wrap"><div style="flex:1;font-size:11px;color:var(--color-text-secondary);padding:3px 0;white-space:pre-wrap">${nv.replace(/</g,'&lt;')}</div></div>`;
  }
  document.getElementById('calBody').innerHTML=html;
  setupScrollSpy();
}

// ===== 年切替 =====
let currentYear=new Date().getFullYear();
function changeYear(delta){
  currentYear+=delta;
  document.getElementById('yearNavLabel').textContent=currentYear+'年';
  if(VIEW_PARAM){
    // 閲覧モード：再ロードせず再描画
    fetch('https://api.github.com/gists/'+VIEW_PARAM)
      .then(r=>r.json())
      .then(gist=>{
        const raw=gist.files['calendar.json']&&gist.files['calendar.json'].content;
        if(raw){const data=JSON.parse(raw);buildCalView(data.ud);}
      }).catch(()=>{});
  } else {
    buildCal();
  }
}
function updateYearLabel(){
  document.getElementById('yearNavLabel').textContent=currentYear+'年';
}
</script>
