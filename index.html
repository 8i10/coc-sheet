<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New','MS PGothic',sans-serif;font-size:12px;background:#d8d8d8;color:#111;min-height:100vh;padding-top:44px}

/* ヘッダー */
#hdr{position:fixed;top:0;left:0;width:100%;background:#333;color:#fff;z-index:999;display:flex;align-items:center;padding:5px 16px;box-shadow:0 2px 5px rgba(0,0,0,.35)}
#hdr-title{font-size:14px;font-weight:bold;flex:1}
#hdr-right{display:flex;align-items:center;gap:8px;font-size:11px}
.hbtn{padding:3px 10px;font-size:11px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}

/* コンテナ */
.container{max-width:960px;margin:0 auto;padding:14px 12px 30px}

/* 認証 */
#auth_box{background:#fff;border-radius:6px;padding:18px;margin-bottom:14px;border:1px solid #ccc;text-align:center}
#auth_box h2{font-size:12px;font-weight:bold;color:#555;margin-bottom:10px}
.auth-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;justify-content:center}
.a-inp{border:1px solid #bbb;padding:4px 8px;font-size:12px;font-family:inherit;border-radius:2px;width:200px;max-width:100%;outline:none}
.a-inp:focus{border-color:#5588cc}
.a-btn{padding:4px 14px;font-size:12px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}
#auth_msg{font-size:11px;margin-top:4px}

/* ツールバー */
#toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
#toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
#new_btn{display:flex;align-items:center;gap:5px;padding:6px 16px;font-size:12px;cursor:pointer;background:#2a7a4a !important;color:#fff !important;border:none;border-radius:3px;font-family:inherit;font-weight:bold;white-space:nowrap}
#new_btn:hover{background:#1a6a3a}
#search_box{flex:1;min-width:180px;max-width:340px;border:1px solid #bbb;border-radius:3px;padding:5px 10px;font-size:12px;font-family:inherit;outline:none;background:#fff}
#search_box:focus{border-color:#5588cc}
#search_hint{font-size:10px;color:#aaa}

/* グリッド2列 */
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* カード */
.card{background:var(--surface);border-radius:5px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15)}
.card-top{display:flex;align-items:stretch;gap:0}
.card-bar{width:5px;flex-shrink:0}
.card-icon{flex-shrink:0;width:56px;align-self:stretch;overflow:hidden;border-right:1px solid var(--border)}
.card-info{flex:1;padding:8px 10px;min-width:0}
.card-tag-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.card-furigana{font-size:10px;color:#555 !important;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-pcname{font-size:15px;font-weight:bold;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-job{font-size:11px;color:#222 !important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.card-meta{display:flex;gap:4px;font-size:11px;flex-wrap:wrap;align-items:center}
.meta-label{color:#aaa}
.meta-value{color:#222;margin-right:6px}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:bold;white-space:nowrap}
.s-alive{background:#d4f5e4;color:#1a7a45}
.s-lost{background:#fde8e8;color:#b03030}
.s-retired{background:#e8eef5;color:#3a5a8a}
.s-missing{background:#fff3d4;color:#8a6000}
.s-dead{background:#e8e8e8;color:#555}
.s-insane{background:#f0e4ff;color:#6a1a9a}
.card-foot{display:flex;align-items:center;padding:5px 10px;border-top:1px solid var(--border);background:var(--surface2);gap:6px}
.card-date{font-size:10px;color:#bbb;flex:1}
.cbtn{padding:2px 9px;font-size:11px;cursor:pointer;border:none;border-radius:2px;font-family:inherit}

/* ローディング・空 */
#loading{text-align:center;padding:50px;color:#aaa;font-size:13px;grid-column:1/-1}
#empty{text-align:center;padding:40px;color:#bbb;font-size:13px;grid-column:1/-1;display:none}
#no_result{text-align:center;padding:20px;color:#bbb;font-size:12px;grid-column:1/-1;display:none}

@media(max-width:600px){
  body{padding-top:44px}
  .container{padding:8px 8px 24px}
  #grid{grid-template-columns:1fr !important}
  #toolbar{flex-wrap:wrap;gap:6px}
  #toolbar-right{width:100%;display:flex;gap:6px}
  #toolbar-right #search_box{flex:1;max-width:none}
  .card-foot{flex-wrap:wrap}
  #new_btn{padding:5px 12px}
  #search_box{max-width:100%}
  .auth-row{flex-direction:column;align-items:stretch}
  .a-inp{width:100% !important;box-sizing:border-box}
}

/* ===== カラーテーマ ===== */
:root{
  --bg:#0d0d12;
  --surface:#16161f;
  --surface2:#1e1e2e;
  --border:#2a2a3d;
  --accent:#c8a97e;
  --accent2:#7e9ec8;
  --text:#e8e4da;
  --text-muted:#8a8499;
  --header-bg:#333;
  --shadow:rgba(0,0,0,0.4);
  --hover:rgba(200,169,126,0.07);
}
body.light{
  --bg:#fff;
  --surface:#ffffff;
  --surface2:#eeeeee;
  --border:#cccccc;
  --accent:#555555;
  --accent2:#3366aa;
  --text:#111;
  --text-muted:#7a6e62;
  --header-bg:#333;
  --shadow:rgba(0,0,0,0.12);
  --hover:rgba(0,0,0,0.04);
}
body{
  background:var(--bg);
  color:var(--text);
  transition:background .25s,color .25s;
}
/* ヘッダー */
#hdr,#sticky-header{
  background:#333 !important;
  border-bottom:1px solid var(--border);
  transition:background .25s;
}
body.light #hdr,body.light #sticky-header{
  background:#333 !important;
}
/* カード・サーフェス */
.card,.char-card,#auth_box,.sheet{background:var(--surface) !important}
.card-foot,.card-body{background:var(--surface2) !important}
.card{border-color:var(--border) !important}
.card:hover{box-shadow:0 3px 12px var(--shadow) !important}
/* テーブル・入力 */
td,th{border-color:var(--border) !important}
th{background:#252535 !important;color:var(--text) !important}
body.light th{background:#ddd8ce !important;color:var(--text) !important}
input[type=text],input[type=number],textarea,select{
  background:var(--surface) !important;
  color:var(--text) !important;
  border-color:var(--border) !important;
}
/* アコーディオン */
.acc-header,.sub-acc-header,.sub2-acc-header,.hdr{
  background:#252535 !important;
  color:var(--text) !important;
}
body.light .acc-header,body.light .sub-acc-header,
body.light .sub2-acc-header,body.light .hdr{
  background:#444 !important;
  color:#fff !important;
}
.acc-body,.sub-acc-body,.sub2-acc-body,.section{
  background:var(--surface2) !important;

// 一覧読み込み
async function loadList(){
  const grid=document.getElementById('grid');
  const loadEl=document.getElementById('loading');
  loadEl.style.display='block';
  document.getElementById('empty').style.display='none';

  try{
    const {data:{user}}=await db.auth.getUser();
    if(!user)return;
    const {data:list,error}=await db
      .from('character_sheets')
      .select('id,char_name,data,updated_at')
      .eq('user_id',user.id)
      .order('updated_at',{ascending:false});
    if(error)throw error;

    loadEl.style.display='none';
    allChars=list||[];
    renderCards(allChars);
  }catch(e){
    loadEl.textContent='読込エラー: '+e.message;
  }
}

function renderCards(chars){
  const grid=document.getElementById('grid');
  // 既存カードを削除（loading/empty/no_result以外）
  [...grid.querySelectorAll('.card')].forEach(el=>el.remove());

  document.getElementById('empty').style.display='none';
  document.getElementById('no_result').style.display='none';
  document.getElementById('loading').style.display='none';

  if(chars.length===0){
    document.getElementById(allChars.length===0?'empty':'no_result').style.display='block';
    return;
  }
  chars.forEach(char=>grid.appendChild(makeCard(char)));

  // カードの高さに合わせて画像を正方形にする
  requestAnimationFrame(()=>{
    grid.querySelectorAll('.card-icon').forEach(icon=>{
      const h=icon.offsetHeight||56;
      icon.style.width=h+'px';
      icon.style.flexShrink='0';
    });
  });

  // 件数表示
  const hint=document.getElementById('search_hint');
  const q=document.getElementById('search_box').value.trim();
  hint.textContent=q?`${chars.length}件 / ${allChars.length}件`:`${allChars.length}件`;
}

// 検索フィルター
function filterCards(){
  const q=document.getElementById('search_box').value.trim().toLowerCase();
  if(!q){renderCards(allChars);return;}
  const filtered=allChars.filter(char=>{
    let sheet={};try{sheet=JSON.parse(char.data);}catch(e){}
    const inputs=sheet.inputs||{};
    const pcname  =(inputs.pcname   ||char.char_name||'').toLowerCase();
    const furigana=(inputs.furigana ||'').toLowerCase();
    const job     =(inputs.job      ||'').toLowerCase();
    // 特徴表: t1_sel・t2_selの選択値
    const t1=(inputs.t1_sel||'').toLowerCase();
    const t2=(inputs.t2_sel||'').toLowerCase();
    // 通過シナリオ
    const scenarios=(sheet.scenarios||[]).join(' ').toLowerCase();
    return pcname.includes(q)||furigana.includes(q)||job.includes(q)||t1.includes(q)||t2.includes(q)||scenarios.includes(q);
  });
  renderCards(filtered);
}

function makeCard(char){
  let sheet={};try{sheet=JSON.parse(char.data);}catch(e){}
  const inp=sheet.inputs||{};

  const pcname  =inp.pcname   ||char.char_name||'名無し';
  const furigana=inp.furigana ||'';
  const job     =inp.job      ||'';
  const age     =inp.age      ||'';
  const gender  =inp.gender   ||'';
  const status  =inp.pc_status||'alive';
  const color   =inp.txtcolor ||'#888888';
  const charImage = inp.charImage||'';
  const charImagePos = inp.charImagePos||'50% 30%';
  const charImageScale = inp.charImageScale||1.3;

  // 現在SAN
  const sanNow=inp.san_now||(parseInt(inp.pow||0)*5)||'?';

  // 更新日 YY/MM/DD
  const d=new Date(char.updated_at);
  const updDate=`${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;

  // メタ行
  const metaParts=[];
  if(age)metaParts.push({label:'年齢：',value:age});
  if(gender)metaParts.push({label:'性別：',value:gender});
  metaParts.push({label:'SAN：',value:String(sanNow)});

  // アイコン画像HTML
  const fixedImg = charImage ? fixDropboxUrlIndex(charImage) : '';
  const pos = (charImagePos||'50% 30%').split(' ');
  const ox = parseFloat(pos[0])||50;
  const oy = parseFloat(pos[1]||pos[0])||30;
  const bgSize = Math.round(charImageScale * 100) + '%';
  const bgPos = ox + '% ' + oy + '%';
  const iconHtml = fixedImg
    ? `<div class="card-icon" style="background-image:url('${esc(fixedImg)}');background-size:${bgSize};background-position:${bgPos};background-repeat:no-repeat"></div>`
    : `<div class="card-icon" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-muted)">${esc(pcname.charAt(0)||'?')}</div>`;

  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=char.id;
  card.innerHTML=`
    <div class="card-top">
      <div class="card-bar" style="background:${esc(color)}"></div>
      ${iconHtml}
      <div class="card-info">
        <div class="card-tag-row">
          <span class="card-furigana">${esc(furigana)}</span>
          <span class="badge ${S_CLS[status]||'s-alive'}">${S_LABEL[status]||status}</span>
        </div>
        <div class="card-pcname">${esc(pcname)}</div>
        ${job?`<div class="card-job">${esc(job)}</div>`:'<div class="card-job" style="color:#ccc">（職業未設定）</div>'}
        <div class="card-meta">${metaParts.map(p=>`<span class="meta-label">${esc(p.label)}</span><span class="meta-value">${esc(p.value)}</span>`).join('')}</div>
      </div>
    </div>
    <div class="card-foot">
      <span class="card-date">更新 ${updDate}</span>
      <button class="cbtn" style="background:#2a7a4a;color:#fff" onclick="openEdit('${char.id}')">✏️ 編集</button>
      <button class="cbtn" style="background:#7755aa;color:#fff" onclick="openView('${char.id}')">👁 閲覧</button>
      <button class="cbtn" style="background:#553388;color:#fff" onclick="openCocoFromIndex('${char.id}')">🐔 駒出力</button>
      <button class="cbtn" style="background:#e05555;color:#fff;border:none" onclick="deleteChar('${char.id}',this)">🗑</button>
    </div>`;
  return card;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fixDropboxUrlIndex(url) {
  if (!url) return '';
  if (url.includes('dropbox.com')) return url.replace('www.dropbox.com','dl.dropboxusercontent.com').replace('?dl=0','').replace('?dl=1','');
  return url;
}

function openEdit(id){
  sessionStorage.setItem('coc_load_id',id);
  location.href='sheet.html';
}
function openView(id){
  location.href='view.html?id='+id;
}

async function deleteChar(id,btn){
  if(!confirm('このキャラクターを削除しますか？\n（この操作は元に戻せません）'))return;
  try{
    await db.from('character_sheets').delete().eq('id',id);
    btn.closest('.card').remove();
    allChars=allChars.filter(c=>c.id!==id);
    if(document.querySelectorAll('#grid .card').length===0)
      document.getElementById(allChars.length===0?'empty':'no_result').style.display='block';
    const hint=document.getElementById('search_hint');
    hint.textContent=allChars.length+'件';
  }catch(e){alert('削除エラー: '+e.message);}
}

// テーマ切り替え
const THEME_KEY = 'coc_theme';
const THEME_VER = 'v2'; // ライトデフォルト化バージョン
function applyTheme(mode){
  document.body.classList.toggle('light', mode==='light');
  localStorage.setItem(THEME_KEY, mode);
  localStorage.setItem(THEME_KEY+'_ver', THEME_VER);
  const btn = document.getElementById('theme_btn');
  if(btn) btn.textContent = mode==='light' ? '🌙' : '☀️';
}
(function(){
  // バージョンが変わった場合はlightにリセット
  const ver = localStorage.getItem(THEME_KEY+'_ver');
  const saved = (ver === THEME_VER) ? (localStorage.getItem(THEME_KEY) || 'light') : 'light';
  applyTheme(saved);
})();

const _MELEE = {kick:'1D6{DB}',kumi:'特殊',punch:'1D3{DB}',atama:'1D4{DB}',ma:'1D3{DB}'};
const _GUN_KEYS = ['gun','smg','sg','mg','rifle'];
const _MA_COMBO = ['kick','punch','atama','kumi'];

function _getCocoStats(inp) {
  const n = k => parseInt(inp[k]||0)||0;
  const str=n('str')+n('str_m')+n('str_t');
  const con=n('con')+n('con_m')+n('con_t');
  const pow=n('pow')+n('pow_m')+n('pow_t');
  const dex=n('dex')+n('dex_m')+n('dex_t');
  const app=n('app')+n('app_m')+n('app_t');
  const siz=n('siz')+n('siz_m')+n('siz_t');
  const int_c=n('int_v')+n('int_m')+n('int_t');
  const edu=n('edu')+n('edu_m')+n('edu_t');
  return {str,con,pow,dex,app,siz,int_c,edu};
}

function _getSkillBase(def, stats) {
  if (def.dyn === 'dex2') return stats.dex * 2;
  if (def.dyn === 'edu5') return stats.edu * 5;
  return def.b || 0;
}

function _getSkillTotal(key, skills, stats) {
  const s = skills.find(x => x.key === key);
  if (!s) return 0;
  const base = (() => {
    for (const cat of Object.values(_SKILLS_DEF)) {
      const d = cat.find(x => x.k === key);
      if (d) return _getSkillBase(d, stats);
    }
    return 0;
  })();
  return base + (parseInt(s.job)||0) + (parseInt(s.int)||0) + (parseInt(s.grw)||0) + (parseInt(s.oth)||0);
}

function _getGunJamNo(total) {
  if (total >= 86) return 100;
  if (total >= 76) return 99;
  if (total >= 51) return 98;
  return 97;
}

function _buildChatPalette(sheet) {
  const inp = sheet.inputs || {};
  const skills = sheet.skills || [];
  const stats = _getCocoStats(inp);
  const weapons = sheet.weapons || [];
  const lines = [];

  lines.push('〇');
  lines.push(':SAN');
  lines.push(':HP');
  lines.push(':MP');
  lines.push(`CCB<={SAN} 【SANチェック】`);
  lines.push(`CCB<=${stats.int_c*5} 【アイデア】`);
  lines.push(`CCB<=${stats.pow*5} 【幸運】`);
  lines.push(`CCB<=${stats.edu*5} 【知識】`);

  const maTotal = _getSkillTotal('ma', skills, stats);
  const maBase = stats.edu; // dummy, ma base=1
  const alwaysKeys = new Set(['kaihi','firstaid']);
  const comboAdded = new Set();

  const sectionOrder = ['combat', null, 'search', 'action', 'talk', 'know'];

  sectionOrder.forEach(sec => {
    if (sec === null) {
      // 武器テーブル
      weapons.forEach(w => {
        const vals = Array.isArray(w) ? w : (w.vals || []);
        const db = typeof w === 'object' && !Array.isArray(w) ? (w.db || false) : false;
        const wName = vals[0]; const wPct = parseInt(vals[1])||0;
        const wDmg = vals[2];
        if (!wName || !wPct) return;
        lines.push(`CCB<=${wPct} 【${wName}】`);
        if (wDmg) lines.push(`${db ? wDmg+'{DB}' : wDmg} 【${wName}】ダメージ`);
      });
      return;
    }

    const defs = _SKILLS_DEF[sec] || [];
    defs.forEach(def => {
      const key = def.k;
      const base = _getSkillBase(def, stats);
      const total = _getSkillTotal(key, skills, stats);
      if (total <= base && !alwaysKeys.has(key)) return;

      const sk = skills.find(x => x.key === key);
      const label = (sk && sk.freeVal) ? def.n + '(' + sk.freeVal + ')' : def.n;
      const isGun = _GUN_KEYS.includes(key);
      const isMelee = key in _MELEE;
      const isMa = key === 'ma';

      if (isGun && total > base) {
        const jamNo = _getGunJamNo(total);
        lines.push(`CCB(${jamNo})<=${total} 【${label}】`);
      } else {
        lines.push(`CCB<=${total} 【${label}】`);
      }

      if (key === 'firstaid') lines.push(`1D3 【応急手当】回復`);
      if (sec === 'combat' && isMelee && total > base) {
        const dmg = _MELEE[key];
        if (dmg && dmg !== '特殊') lines.push(`${dmg} 【${label}】ダメージ`);
      }
      if (isMa && total > base) lines.push(`1D3{DB} 【武道(MA)】ダメージ`);
      if (maTotal > 1 && _MA_COMBO.includes(key) && total > base) {
        const ck = `ma_${key}`;
        if (!comboAdded.has(ck)) {
          comboAdded.add(ck);
          lines.push(`CBRB(${maTotal},${total}) 【武道(MA)】+【${label}】`);
          lines.push(`2D6{DB} 【武道(MA)】+【${label}】ダメージ`);
        }
      }
    });
  });

  // カスタム追加技能（custom_xxx キー）
  skills.forEach(s => {
    if (!s.key || !s.key.startsWith('custom_')) return;
    const name = (s.freeVal || '').trim();
    if (!name) return; // 名前未入力はスキップ
    const base = parseInt(s.base) || 0;
    const total = base + (parseInt(s.job)||0) + (parseInt(s.int)||0) + (parseInt(s.grw)||0) + (parseInt(s.oth)||0);
    if (total <= base) return; // 初期値超えのみ出力
    lines.push(`CCB<=${total} 【${name}】`);
  });

  lines.push(`CCB<={STR}*5 【STR】`);
  lines.push(`CCB<={CON}*5 【CON】`);
  lines.push(`CCB<={POW}*5 【POW】`);
  lines.push(`CCB<={DEX}*5 【DEX】`);
  lines.push(`CCB<={APP}*5 【APP】`);
  lines.push(`CCB<={SIZ}*5 【SIZ】`);
  lines.push(`CCB<={INT}*5 【INT】`);
  lines.push(`CCB<={EDU}*5 【EDU】`);

  return lines.join('\n');
}

function _buildCocoJSON(sheet) {
  const inp = sheet.inputs || {};
  const stats = _getCocoStats(inp);
  const pcname = inp.pcname || 'キャラクター';
  const txtcolor = inp.txtcolor || '#000000';
  const san_now = parseInt(inp.san_now)||0;
  const max_san = stats.pow * 5;
  const hp = Math.ceil((stats.con + stats.siz) / 2);
  const mp = stats.pow;

  return {
    kind: 'character',
    formatVersion: 1,
    data: {
      name: pcname,
      initiative: stats.dex,
      externalUrl: '',
      status: [
        {label:'HP', value: hp, max: hp},
        {label:'MP', value: mp, max: mp},
        {label:'SAN', value: san_now, max: max_san},
      ],
      params: [
        {label:'STR',value:String(stats.str)},{label:'CON',value:String(stats.con)},
        {label:'POW',value:String(stats.pow)},{label:'DEX',value:String(stats.dex)},
        {label:'APP',value:String(stats.app)},{label:'SIZ',value:String(stats.siz)},
        {label:'INT',value:String(stats.int_c)},{label:'EDU',value:String(stats.edu)},
      ],
      commands: _buildChatPalette(sheet),
      memo: '',
      secret: false,
    }
  };
}

async function openCocoFromIndex(id) {
  const { data, error } = await db.from('character_sheets').select('data').eq('id', id).single();
  if (error || !data) { alert('データが見つかりません'); return; }
  _cocoSheet = JSON.parse(data.data);

  const palette = _buildChatPalette(_cocoSheet);
  const old = document.getElementById('cocofolia_modal');
  if (old) old.remove();

  const modal = document.createElement('div');
  modal.id = 'cocofolia_modal';
  modal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;z-index:99999;width:min(480px,92vw);box-shadow:0 4px 20px rgba(0,0,0,.5)';
  modal.innerHTML = `
    <div style="font-weight:bold;font-size:12px;color:var(--text);margin-bottom:6px">🐔 駒出力 - ${(_cocoSheet.inputs?.pcname||'')}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">📝 チャットパレット（プレビュー・編集可）</div>
    <textarea id="coco_palette_preview" style="width:100%;height:220px;font-size:11px;font-family:monospace;border:1px solid var(--border);padding:4px;resize:vertical;background:var(--surface2);color:var(--text)">${palette}</textarea>
    <div id="coco_copy_msg" style="font-size:11px;color:#2a7;display:none;margin:6px 0">✓ クリップボードにコピーしました！</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text)">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" id="coco_secret_check" style="width:14px;height:14px;cursor:pointer">
        非公開（secret）にする
      </label>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button onclick="document.getElementById('cocofolia_modal').remove()" style="font-size:11px;padding:3px 12px;cursor:pointer;background:#aaa;color:#fff;border:none;border-radius:2px">閉じる</button>
      <button onclick="_doCocoCopy()" style="font-size:11px;padding:3px 16px;cursor:pointer;background:#7755aa;color:#fff;border:none;border-radius:2px;font-weight:bold">📋 コマJSONをコピー</button>
    </div>`;
  document.body.appendChild(modal);
}

function _doCocoCopy() {
  if (!_cocoSheet) return;
  const palette = document.getElementById('coco_palette_preview')?.value || _buildChatPalette(_cocoSheet);
  const json = _buildCocoJSON(_cocoSheet);
  json.data.commands = palette;
  json.data.secret = document.getElementById('coco_secret_check')?.checked || false;
  navigator.clipboard.writeText(JSON.stringify(json, null, 2)).then(() => {
    const msg=document.getElementById('coco_copy_msg');
    if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',3000);}
  }).catch(() => alert('コピーに失敗しました'));
}
