<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⛩ TRPGシナリオ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f5;--surface:#ffffff;--surface2:#eeeeee;
    --border:#d4d4d4;--accent:#333333;--text:#1a1a1a;--text-muted:#888888;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:"Zen Kaku Gothic New",sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* タブバー */
  .tabbar{background:#8b0000;border-bottom:1px solid #6b0000;display:flex;align-items:stretch;flex-shrink:0;padding:0 8px;overflow-x:auto;position:sticky;top:0;z-index:1000;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,0.75);font-family:inherit;font-size:11px;font-weight:500;padding:5px 16px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .tab:hover{color:#ffffff;}
  .tab.active{color:#ffffff;background:#000000;border-bottom:3px solid #000000;font-weight:700;}

  /* iframe領域 */
  .frame-wrap{flex:1;position:relative;overflow:hidden;}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:var(--bg);}
  iframe.active{display:block;}

  @media(max-width:640px){
    .tab{font-size:11px;padding:5px 12px;}
  }
</style>
</head>
<body>

<div class="tabbar" id="tabbar">
  <button class="tab active" data-tab="yukitai" onclick="switchTab('yukitai')">行きたいシナリオ</button>
  <button class="tab" data-tab="kaiseru" onclick="switchTab('kaiseru')">回せるシナリオ</button>
  <button class="tab" data-tab="rule" onclick="switchTab('rule')">おあげ卓ルール</button>
</div>

<div class="frame-wrap">
  <iframe id="frame-yukitai" class="active" data-src="yukitai.html" title="行きたいシナリオ"></iframe>
  <iframe id="frame-kaiseru" data-src="mawaseru.html" title="回せるシナリオ"></iframe>
  <iframe id="frame-rule" data-src="rule.html" title="卓のルール"></iframe>
</div>

<script>
// ?edit=1 を子iframeへ伝播
const IS_EDIT = new URLSearchParams(location.search).get('edit') === '1';
const suffix = IS_EDIT ? '?edit=1' : '';

const loaded = {};

function loadFrame(tab){
  const frame = document.getElementById('frame-'+tab);
  if(!loaded[tab]){
    frame.src = frame.dataset.src + suffix;
    loaded[tab] = true;
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('iframe').forEach(f=>f.classList.toggle('active',f.id==='frame-'+tab));
  loadFrame(tab);
}

// 初期タブを読み込み
loadFrame('yukitai');
</script>
</body>
</html>
