<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>キャラクター一覧 - CoC6版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New','MS PGothic',sans-serif;font-size:12px;background:#d8d8d8;color:#111;min-height:100vh;padding-top:44px}

/* ヘッダー */
#hdr{position:fixed;top:0;left:0;width:100%;background:#333;color:#fff;z-index:999;display:flex;align-items:center;padding:5px 16px;box-shadow:0 2px 5px rgba(0,0,0,.35)}
#hdr-title{font-size:14px;font-weight:bold;flex:1}
#hdr-right{display:flex;align-items:center;gap:8px;font-size:11px}
#hdr-user{color:#ccc;font-size:11px}
.hbtn{padding:3px 10px;font-size:11px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}

/* コンテナ */
.container{max-width:960px;margin:0 auto;padding:14px 12px 30px}

/* 認証 */
#auth_box{background:#fff;border-radius:6px;padding:18px;margin-bottom:14px;border:1px solid #ccc}
#auth_box h2{font-size:12px;font-weight:bold;color:#555;margin-bottom:10px}
.auth-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.a-inp{border:1px solid #bbb;padding:4px 8px;font-size:12px;font-family:inherit;border-radius:2px;width:200px;outline:none}
.a-inp:focus{border-color:#5588cc}
.a-btn{padding:4px 14px;font-size:12px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}
#auth_msg{font-size:11px;margin-top:4px}

/* ツールバー */
#toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
#toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
#new_btn{display:flex;align-items:center;gap:5px;padding:6px 16px;font-size:12px;cursor:pointer;background:#5a3a8a;color:#fff;border:none;border-radius:3px;font-family:inherit;font-weight:bold;white-space:nowrap}
#new_btn:hover{background:#4a2a7a}
#search_box{flex:1;min-width:180px;max-width:340px;border:1px solid #bbb;border-radius:3px;padding:5px 10px;font-size:12px;font-family:inherit;outline:none;background:#fff}
#search_box:focus{border-color:#5588cc}
#search_hint{font-size:10px;color:#aaa}

/* グリッド2列 */
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:600px){#grid{grid-template-columns:1fr}}

/* カード */
.card{background:#fff;border-radius:5px;border:1px solid #ccc;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15)}
.card-top{display:flex;align-items:stretch;gap:0}
.card-bar{width:5px;flex-shrink:0}
.card-info{flex:1;padding:8px 10px;min-width:0}
.card-tag-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.card-furigana{font-size:10px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-pcname{font-size:15px;font-weight:bold;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-job{font-size:11px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.card-meta{display:flex;gap:12px;font-size:11px;color:#666}
.card-meta span{white-space:nowrap}
/* ステータスバッジ */
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:bold;white-space:nowrap}
.s-alive{background:#d4f5e4;color:#1a7a45}
.s-lost{background:#fde8e8;color:#b03030}
.s-retired{background:#e8eef5;color:#3a5a8a}
.s-missing{background:#fff3d4;color:#8a6000}
.s-dead{background:#e8e8e8;color:#555}
.s-insane{background:#f0e4ff;color:#6a1a9a}
/* フッター */
.card-foot{display:flex;align-items:center;padding:5px 10px;border-top:1px solid #f0f0f0;background:#fafafa;gap:6px}
.card-date{font-size:10px;color:#bbb;flex:1}
.cbtn{padding:2px 9px;font-size:11px;cursor:pointer;border:none;border-radius:2px;font-family:inherit}

/* ローディング・空 */
#loading{text-align:center;padding:50px;color:#aaa;font-size:13px;grid-column:1/-1}
#empty{text-align:center;padding:40px;color:#bbb;font-size:13px;grid-column:1/-1;display:none}
#no_result{text-align:center;padding:20px;color:#bbb;font-size:12px;grid-column:1/-1;display:none}
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="hdr">
  <div id="hdr-title">📋 キャラクター一覧</div>
  <div id="hdr-right">
    <span id="hdr-user"></span>
    <button id="logout_btn" class="hbtn" style="background:#666;display:none" onclick="doLogout()">ログアウト</button>
  </div>
</div>

<div class="container">

  <!-- 認証 -->
  <div id="auth_box">
    <h2>🔑 ログイン / アカウント登録</h2>
    <div class="auth-row">
      <input class="a-inp" type="email" id="auth_email" placeholder="メールアドレス">
      <input class="a-inp" type="password" id="auth_pass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="a-btn" style="background:#2a7" onclick="doLogin()">ログイン</button>
      <button class="a-btn" style="background:#558" onclick="doSignup()">新規登録</button>
    </div>
    <div id="auth_msg"></div>
  </div>

  <!-- ツールバー -->
  <div id="toolbar" style="display:none">
    <button id="new_btn" onclick="goNew()">＋ 新規作成</button>
    <div id="toolbar-right">
      <input id="search_box" type="text" placeholder="PC名・職業で検索..." oninput="filterCards()">
      <span id="search_hint"></span>
    </div>
  </div>

  <!-- カードグリッド -->
  <div id="grid">
    <div id="loading">読込中...</div>
    <div id="empty">保存されたキャラクターはまだありません。<br>「新規作成」から作ってみましょう！</div>
    <div id="no_result">検索結果がありません</div>
  </div>

</div>

<script>
const SUPABASE_URL='https://cicodhxebyqewfnngfwt.supabase.co/';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpY29kaHhlYnlxZXdmbm5nZnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzM4NDYsImV4cCI6MjA5NTY0OTg0Nn0.huLOglTPbW1CcGDbDB_yf5ftqEkqmtJ1HBY9WTx9J8E';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const S_LABEL={alive:'生存',lost:'ロスト',retired:'引退',missing:'行方不明',dead:'死亡',insane:'永久狂気'};
const S_CLS  ={alive:'s-alive',lost:'s-lost',retired:'s-retired',missing:'s-missing',dead:'s-dead',insane:'s-insane'};

let allChars=[];

// 起動時ログイン確認
db.auth.getSession().then(({data:{session}})=>{
  if(session){onLoggedIn(session.user);loadList();}
  else{document.getElementById('loading').style.display='none';}
});

function onLoggedIn(user){
  document.getElementById('auth_box').style.display='none';
  document.getElementById('toolbar').style.display='flex';
  document.getElementById('hdr-user').textContent='ログイン中: '+user.email;
  document.getElementById('logout_btn').style.display='inline-block';
}

async function doLogin(){
  const email=document.getElementById('auth_email').value.trim();
  const pass =document.getElementById('auth_pass').value;
  const msg  =document.getElementById('auth_msg');
  msg.style.color='#c00';msg.textContent='';
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){msg.textContent='エラー: '+error.message;return;}
  onLoggedIn(data.user);loadList();
}

async function doSignup(){
  const email=document.getElementById('auth_email').value.trim();
  const pass =document.getElementById('auth_pass').value;
  const msg  =document.getElementById('auth_msg');
  msg.style.color='#c00';msg.textContent='';
  const {error}=await db.auth.signUp({email,password:pass});
  if(error){msg.textContent='エラー: '+error.message;return;}
  msg.style.color='#2a7';msg.textContent='確認メールを送信しました。メールをご確認ください。';
}

async function doLogout(){
  await db.auth.signOut();location.reload();
}

function goNew(){
  sessionStorage.setItem('coc_new_char','1');
  location.href='sheet.html';
}

// 一覧読み込み
async function loadList(){
  const grid=document.getElementById('grid');
  const loadEl=document.getElementById('loading');
  loadEl.style.display='block';
  document.getElementById('empty').style.display='none';

  try{
    const {data:{user}}=await db.auth.getUser();
    if(!user)return;
    const {data:list,error}=await db
      .from('character_sheets')
      .select('id,char_name,data,updated_at')
      .eq('user_id',user.id)
      .order('updated_at',{ascending:false});
    if(error)throw error;

    loadEl.style.display='none';
    allChars=list||[];
    renderCards(allChars);
  }catch(e){
    loadEl.textContent='読込エラー: '+e.message;
  }
}

function renderCards(chars){
  const grid=document.getElementById('grid');
  // 既存カードを削除（loading/empty/no_result以外）
  [...grid.querySelectorAll('.card')].forEach(el=>el.remove());

  document.getElementById('empty').style.display='none';
  document.getElementById('no_result').style.display='none';
  document.getElementById('loading').style.display='none';

  if(chars.length===0){
    document.getElementById(allChars.length===0?'empty':'no_result').style.display='block';
    return;
  }
  chars.forEach(char=>grid.appendChild(makeCard(char)));

  // 件数表示
  const hint=document.getElementById('search_hint');
  const q=document.getElementById('search_box').value.trim();
  hint.textContent=q?`${chars.length}件 / ${allChars.length}件`:`${allChars.length}件`;
}

// 検索フィルター
function filterCards(){
  const q=document.getElementById('search_box').value.trim().toLowerCase();
  if(!q){renderCards(allChars);return;}
  const filtered=allChars.filter(char=>{
    let sheet={};try{sheet=JSON.parse(char.data);}catch(e){}
    const inputs=sheet.inputs||{};
    const pcname=(inputs.pcname||char.char_name||'').toLowerCase();
    const job=(inputs.job||'').toLowerCase();
    return pcname.includes(q)||job.includes(q);
  });
  renderCards(filtered);
}

function makeCard(char){
  let sheet={};try{sheet=JSON.parse(char.data);}catch(e){}
  const inp=sheet.inputs||{};

  const pcname  =inp.pcname   ||char.char_name||'名無し';
  const furigana=inp.furigana ||'';
  const job     =inp.job      ||'';
  const age     =inp.age      ||'';
  const gender  =inp.gender   ||'';
  const status  =inp.pc_status||'alive';
  const color   =inp.txtcolor ||'#888888';

  // 現在SAN
  const sanNow=inp.san_now||(parseInt(inp.pow||0)*5)||'?';

  // 更新日 YY/MM/DD
  const d=new Date(char.updated_at);
  const updDate=`${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;

  // メタ行
  const metaParts=[];
  if(age)metaParts.push('年齢：'+age);
  if(gender)metaParts.push('性別：'+gender);
  metaParts.push('SAN：'+sanNow);

  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=char.id;
  card.innerHTML=`
    <div class="card-top">
      <div class="card-bar" style="background:${esc(color)}"></div>
      <div class="card-info">
        <div class="card-tag-row">
          <span class="card-furigana">${esc(furigana)}</span>
          <span class="badge ${S_CLS[status]||'s-alive'}">${S_LABEL[status]||status}</span>
        </div>
        <div class="card-pcname">${esc(pcname)}</div>
        ${job?`<div class="card-job">${esc(job)}</div>`:'<div class="card-job" style="color:#ccc">（職業未設定）</div>'}
        <div class="card-meta">${metaParts.map(p=>`<span>${esc(p)}</span>`).join('')}</div>
      </div>
    </div>
    <div class="card-foot">
      <span class="card-date">更新 ${updDate}</span>
      <button class="cbtn" style="background:#558;color:#fff" onclick="openEdit('${char.id}')">✏️ 編集</button>
      <button class="cbtn" style="background:#7755aa;color:#fff" onclick="openView('${char.id}')">👁 閲覧</button>
      <button class="cbtn" style="background:#fee;color:#933;border:1px solid #e99" onclick="deleteChar('${char.id}',this)">🗑</button>
    </div>`;
  return card;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openEdit(id){
  sessionStorage.setItem('coc_load_id',id);
  location.href='sheet.html';
}
function openView(id){
  location.href='view.html?id='+id;
}

async function deleteChar(id,btn){
  if(!confirm('このキャラクターを削除しますか？\n（この操作は元に戻せません）'))return;
  try{
    await db.from('character_sheets').delete().eq('id',id);
    btn.closest('.card').remove();
    allChars=allChars.filter(c=>c.id!==id);
    if(document.querySelectorAll('#grid .card').length===0)
      document.getElementById(allChars.length===0?'empty':'no_result').style.display='block';
    const hint=document.getElementById('search_hint');
    hint.textContent=allChars.length+'件';
  }catch(e){alert('削除エラー: '+e.message);}
}
</script>
</body>
</html>
