<title>キャラクター一覧 - CoC6版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New','MS PGothic',sans-serif;font-size:12px;background:#d8d8d8;color:#111;min-height:100vh;padding-top:44px}

/* ヘッダー */
#hdr{position:fixed;top:0;left:0;width:100%;background:#333;color:#fff;z-index:999;display:flex;align-items:center;padding:5px 16px;box-shadow:0 2px 5px rgba(0,0,0,.35)}
#hdr-title{font-size:14px;font-weight:bold;flex:1}
#hdr-right{display:flex;align-items:center;gap:8px;font-size:11px}
.hbtn{padding:3px 10px;font-size:11px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}

/* コンテナ */
.container{max-width:960px;margin:0 auto;padding:14px 12px 30px}

/* 認証 */
#auth_box{background:#fff;border-radius:6px;padding:18px;margin-bottom:14px;border:1px solid #ccc;text-align:center}
#auth_box h2{font-size:12px;font-weight:bold;color:#555;margin-bottom:10px}
.auth-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;justify-content:center}
.a-inp{border:1px solid #bbb;padding:4px 8px;font-size:12px;font-family:inherit;border-radius:2px;width:200px;max-width:100%;outline:none}
.a-inp:focus{border-color:#5588cc}
.a-btn{padding:4px 14px;font-size:12px;cursor:pointer;border:none;border-radius:2px;color:#fff;font-family:inherit}
#auth_msg{font-size:11px;margin-top:4px}

/* ツールバー */
#toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
#toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
#new_btn{display:flex;align-items:center;gap:5px;padding:6px 16px;font-size:12px;cursor:pointer;background:#2a7a4a !important;color:#fff !important;border:none;border-radius:3px;font-family:inherit;font-weight:bold;white-space:nowrap}
#counter_btn,#status_btn,#menu_btn{padding:2px 10px;font-size:12px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:3px;transition:all .2s}
#counter_btn:hover,#status_btn:hover,#menu_btn:hover{border-color:var(--accent);color:var(--accent)}
#menu_btn{font-size:17px;line-height:1;padding:1px 9px}
#index_menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:5px;box-shadow:0 4px 16px rgba(0,0,0,.35);min-width:150px;z-index:99999;overflow:hidden}
#index_menu .menu-item{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px}
#index_menu .menu-item:hover{background:var(--surface2)}
.menu-sep{height:1px;background:var(--border);margin:2px 0}
#new_btn:hover{background:#1a6a3a}
#search_box{flex:1;min-width:180px;max-width:340px;border:1px solid #bbb;border-radius:3px;padding:5px 10px;font-size:12px;font-family:inherit;outline:none;background:#fff}
#search_box:focus{border-color:#5588cc}
#search_hint{font-size:10px;color:#aaa}

/* グリッド2列 */
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* カード */
.card{background:var(--surface);border-radius:5px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15)}
.card-top{display:flex;align-items:stretch;gap:0}
.card-bar{width:5px;flex-shrink:0}
.card-icon{flex-shrink:0;width:56px;align-self:stretch;overflow:hidden;border-right:1px solid var(--border)}
.card-info{flex:1;padding:8px 10px;min-width:0}
.card-tag-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.card-furigana{font-size:9px;color:#555 !important;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-pcname{font-size:15px;font-weight:bold;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-job{font-size:11px;color:#222 !important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.card-meta{display:flex;gap:4px;font-size:11px;flex-wrap:wrap;align-items:center}
.card-tokucho{font-size:10px;margin-top:3px;line-height:1.45;display:flex;flex-wrap:wrap;column-gap:12px;row-gap:2px;margin-left:-0.35em}
.card-tokucho .meta-value{margin-right:0;color:#555 !important}
body:not(.light) .card-tokucho .meta-value{color:#aaa !important}
body.light .card-tokucho .meta-value{color:#555 !important}
.meta-label{color:#aaa}
.meta-value{color:#222;margin-right:6px}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:bold;white-space:nowrap}
.s-alive{background:#d4f5e4;color:#1a7a45}
.s-lost{background:#fde8e8;color:#b03030}
.s-retired{background:#e8eef5;color:#3a5a8a}
.s-missing{background:#fff3d4;color:#8a6000}
.s-dead{background:#e6d9f7;color:#5e2b9e}
.s-insane{background:#f0e4ff;color:#6a1a9a}
/* 並び替え・フィルタ・タグ・状態 */
#ctrlbar{display:none;flex-wrap:wrap;gap:6px;align-items:center;margin:6px 0 2px}
#ctrlbar label{font-size:11px;color:var(--text-muted)}
#ctrlbar select{font-size:12px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text)}
#sort_dir{font-size:12px;padding:3px 9px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text)}
#tag_filter{display:flex;flex-wrap:wrap;gap:5px;margin:3px 0 4px}
/* ライトモード：件数・並び替え等のラベルを濃い灰色に */
body.light #search_hint{color:#555}
body.light #ctrlbar label{color:#555}
/* タグ絞込みアコーディオン（スマホのみ表示） */
#tagfilter_toggle{display:none;font-size:12px;padding:4px 10px;margin:4px 0;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);align-items:center;gap:6px}
.tagchip{font-size:11px;padding:2px 9px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;user-select:none}
.tagchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;align-items:center}
.card-tag{font-size:10px;padding:1px 7px;border-radius:9px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.card-tag-edit{font-size:10px;padding:1px 7px;border-radius:9px;background:transparent;color:var(--accent2);border:1px dashed var(--border);cursor:pointer}
.card-tags-foot{flex:1;margin-top:0;min-width:0}
.badge{cursor:pointer}
#status_pop{position:fixed;z-index:99999;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.35);padding:4px;display:none}

const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const S_LABEL={alive:'生存',lost:'ロスト',retired:'引退',missing:'行方不明',dead:'継続不可',insane:'永久狂気'};
const S_CLS  ={alive:'s-alive',lost:'s-lost',retired:'s-retired',missing:'s-missing',dead:'s-dead',insane:'s-insane'};

let allChars=[];

/* ===== 並び替え・タグ・状態フィルタ ===== */
let sortKey='updated', sortDir='desc';
let activeTags=new Set();
const AB_KEYS=['str','con','pow','dex','app','siz','int_v','edu'];
const S_ORDER={alive:0,missing:1,insane:2,retired:3,lost:4,dead:5};

function getSheet(char){
  if(char._sheet)return char._sheet;
  let s={};try{s=JSON.parse(char.data)||{};}catch(e){}
  char._sheet=s;return s;
}
function charTags(char){const s=getSheet(char);return Array.isArray(s.tags)?s.tags:[];}
function charStatus(char){return (getSheet(char).inputs||{}).pc_status||'alive';}
function charSan(char){const inp=getSheet(char).inputs||{};const v=parseInt(inp.san_now);if(!isNaN(v))return v;const p=parseInt(inp.pow);return isNaN(p)?null:p*5;}

function sortVal(char){
  const inp=getSheet(char).inputs||{};
  switch(sortKey){
    case 'name':   return (inp.pcname||char.char_name||'');
    case 'furigana': return kanaNorm(inp.furigana);
    case 'san':    return charSan(char);
    case 'status': return (S_ORDER[charStatus(char)]??9);
    case 'updated':return new Date(char.updated_at).getTime();
    default:
      if(AB_KEYS.includes(sortKey)){const n=parseInt(inp[sortKey]);return isNaN(n)?null:n;}
      return 0;
  }
}

function toggleSortDir(){
  sortDir = (sortDir==='asc'?'desc':'asc');
  document.getElementById('sort_dir').textContent = (sortDir==='asc'?'▲ 昇順':'▼ 降順');
  applyFilters();
}

function applyFilters(){
  sortKey=document.getElementById('sort_key').value;
  const activeStatus=document.getElementById('status_filter').value;
  const q=(document.getElementById('search_box').value||'').trim().toLowerCase();
  let rows=allChars.filter(char=>{
    if(activeStatus && charStatus(char)!==activeStatus)return false;
    if(activeTags.size){const tg=charTags(char);if(![...activeTags].some(t=>tg.includes(t)))return false;}
    if(q){
      const s=getSheet(char);const inp=s.inputs||{};
      const hay=[(inp.pcname||char.char_name||''),(inp.furigana||''),(inp.job||''),
        tokuchoLabel(inp.t1_sel)+' '+(inp.t1_memo||''),tokuchoLabel(inp.t2_sel)+' '+(inp.t2_memo||''),
        (s.scenarios||[]).join(' '),charTags(char).join(' ')].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  const dir=(sortDir==='asc'?1:-1);
  rows.sort((a,b)=>{
    const va=sortVal(a), vb=sortVal(b);
    if(sortKey==='name'||sortKey==='furigana'){
      const sa=String(va||''), sb=String(vb||'');
      if(sortKey==='furigana'){ if(!sa&&!sb)return 0; if(!sa)return 1; if(!sb)return -1; }
      return sa.localeCompare(sb,'ja')*dir;
    }
    const an=(va==null),bn=(vb==null);
    if(an&&bn)return 0; if(an)return 1; if(bn)return -1;
    return (va-vb)*dir;
  });
  renderCards(rows);
}

/* ===== 誕生日一覧 ===== */
const _BD_MDAYS=[31,29,31,30,31,30,31,31,30,31,30,31]; // 2/29も表示（うるう年対応）
// sheetの誕生日（自由入力）から 月/日 を抽出。「1月1日」「1/1」「01-01」「1.1」「2000/1/1」等に対応
function parseBirthday(s){
  if(!s)return null;
  const t=String(s).trim().replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  let m=t.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日?/);                       // 1月1日
  if(!m) m=t.match(/(?:\d{4}\s*[\/\-.年]\s*)?(\d{1,2})\s*[\/\-.]\s*(\d{1,2})(?!\s*[\/\-.]\s*\d)/); // 1/1, 2000/1/1
  if(!m) return null;
  const mo=parseInt(m[1],10), d=parseInt(m[2],10);
  if(!(mo>=1&&mo<=12))return null;
  if(!(d>=1&&d<=_BD_MDAYS[mo-1]))return null;
  return {m:mo,d:d};
}
function openBirthdayList(){
  const byKey={}; const unknown=[];
  (allChars||[]).forEach(c=>{
    const s=getSheet(c); const inp=(s&&s.inputs)||{};
    const name=(inp.pcname||c.char_name||'(名前未設定)').trim();
    const bd=parseBirthday(inp.birthday);
    if(!bd){ if((inp.birthday||'').trim()) unknown.push(name+'（'+inp.birthday.trim()+'）'); return; }
    const k=bd.m+'-'+bd.d;
    (byKey[k]=byKey[k]||[]).push({name,id:c.id});
  });
  const list=document.getElementById('bday_list');
  const sub=document.getElementById('bday_sub');
  let cnt=0; Object.values(byKey).forEach(a=>cnt+=a.length);
  if(sub)sub.textContent='誕生日が登録されたPC：'+cnt+'人（PC名をタップでシートを開く）';
  let html='';
  for(let mo=1;mo<=12;mo++){
    html+='<div class="bd-month">'+mo+'月</div>';
    for(let d=1;d<=_BD_MDAYS[mo-1];d++){
      const arr=byKey[mo+'-'+d]||[];
      const names=arr.map(o=>'<a class="bd-name" onclick="location.href=\'sheet.html?id='+o.id+'\'">'+esc(o.name)+'</a>').join('');
      html+='<div class="bd-row'+(arr.length?' has':'')+'"><span class="bd-date">'+mo+'月'+d+'日</span><span class="bd-names">'+names+'</span></div>';
    }
  }
  if(unknown.length) html+='<div class="bd-unknown">日付を判別できなかった誕生日：<br>'+unknown.map(esc).join('<br>')+'</div>';
  list.innerHTML=html;
  document.getElementById('bday_overlay').classList.add('on');
}
function closeBirthdayList(){document.getElementById('bday_overlay').classList.remove('on');}
function toggleTagFilter(){
  const tf=document.getElementById('tag_filter');
  const ar=document.getElementById('tagfilter_arrow');
  const tg=document.getElementById('tagfilter_toggle');
  if(!tf)return;
  const open=tf.classList.toggle('open');
  if(ar)ar.textContent=open?'▲':'▼';
  if(tg)tg.setAttribute('aria-expanded',open?'true':'false');
}
function buildTagFilter(){
  const all=new Set();
  allChars.forEach(c=>charTags(c).forEach(t=>all.add(t)));
  [...activeTags].forEach(t=>{if(!all.has(t))activeTags.delete(t);});
  const wrap=document.getElementById('tag_filter');
  if(!wrap)return;
  const _tgl=document.getElementById('tagfilter_toggle');
  if(all.size===0){wrap.innerHTML=''; if(_tgl)_tgl.style.display='none'; return;}
  if(_tgl)_tgl.style.display='';
  wrap.innerHTML=orderedTags().map(t=>
    `<span class="tagchip ${activeTags.has(t)?'on':''}" data-tag="${esc(t)}">${esc(t)}</span>`
  ).join('');
}
/* タグ並び順（localStorageに保存） */
function getTagOrder(){ try{return JSON.parse(localStorage.getItem('coc_tag_order')||'[]');}catch(e){return [];} }
function setTagOrder(arr){ try{localStorage.setItem('coc_tag_order',JSON.stringify(arr));}catch(e){} }
function orderedTags(){
  const order=getTagOrder();
  const all=[...allTagsUnion()];
  all.sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b);
    if(ia!==-1&&ib!==-1)return ia-ib;
    if(ia!==-1)return -1;
    if(ib!==-1)return 1;
    return a.localeCompare(b,'ja');
  });
  return all;
}
function sortTagsByOrder(arr){
  const order=getTagOrder();
  return [...(arr||[])].sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b);
    if(ia!==-1&&ib!==-1)return ia-ib;
    if(ia!==-1)return -1; if(ib!==-1)return 1;
    return a.localeCompare(b,'ja');
  });
}

/* ===== ふりがな見出し ===== */
function kanaNorm(furi){
  if(!furi)return '';
  let out='';
  for(const ch of String(furi).trim()){
    const code=ch.charCodeAt(0);
    out+=(code>=0x30A1&&code<=0x30F6)?String.fromCharCode(code-0x60):ch; // カタカナ→ひらがな
  }
  return out;
}
function kanaHead(furi){
  const n=kanaNorm(furi);
  if(!n)return 'その他';
  const c=n.charAt(0);
  if('あいうえおぁぃぅぇぉ'.includes(c))return 'あ';
  if('かきくけこがぎぐげごゕゖ'.includes(c))return 'か';
  if('さしすせそざじずぜぞ'.includes(c))return 'さ';
  if('たちつてとだぢづでどっ'.includes(c))return 'た';
  if('なにぬねの'.includes(c))return 'な';
  if('はひふへほばびぶべぼぱぴぷぺぽ'.includes(c))return 'は';
  if('まみむめも'.includes(c))return 'ま';
  if('やゆよゃゅょ'.includes(c))return 'や';
  if('らりるれろ'.includes(c))return 'ら';
  if('わをんゎ'.includes(c))return 'わ';
  return 'その他';
}

async function bulkApply(mutator, okMsg){
  const ids=[...selectedIds];

  let okc=0;
  for(const id of ids){
    try{

      if(error)throw error;
      let s={};try{s=JSON.parse(row.data)||{};}catch(e){}
      mutator(s);
      const newData=JSON.stringify(s);
      const {error:e2}=await db.from('character_sheets').update({data:newData}).eq('id',id);
      if(e2)throw e2;
      const char=allChars.find(c=>c.id===id); if(char){char.data=newData;char._sheet=s;}
      okc++;
    }catch(e){console.warn('bulk err',id,e);}
  }
  buildTagFilter(); applyFilters(); showToast(okMsg.replace('{n}',okc));
}

function _dateStamp(){const d=new Date();const p=n=>String(n).padStart(2,'0');return ''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate());}
function _downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},150);}
function _csvCell(v){v=String(v==null?'':v);if(/[",\r\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';return v;}
async function exportJSON(){
  if(!allChars.length){showToast('データがありません');return;}
  if(typeof JSZip==='undefined'){showToast('ZIPライブラリを読み込めませんでした');return;}
  const zip=new JSZip();
  const used={};
  allChars.forEach(c=>{
    let obj={};
    try{obj=JSON.parse(c.data)||{};}catch(e){obj={};}
    const inp=obj.inputs||{};
    // タグを最新化
    const tags=charTags(c); if(tags.length)obj.tags=tags;
    // 特徴表を読みやすく明示（t1_sel/t2_sel は元データにも保持）
    const feats=[tokuchoLabel(inp.t1_sel),tokuchoLabel(inp.t2_sel)].filter(Boolean);
    if(feats.length)obj.feature_labels=feats;
    // ファイル名（PC名、使用不可文字を除去・重複回避）
    let name=((c.char_name||inp.pcname||'character')+'').trim()||'character';
    name=name.replace(/[\\/:*?"<>|\n\r\t]/g,'_');
    let fn=name, i=2; while(used[fn]){fn=name+'_'+i;i++;} used[fn]=1;
    zip.file(fn+'.json', JSON.stringify(obj,null,2));
  });
  try{
    const blob=await zip.generateAsync({type:'blob'});
    _downloadBlob(blob, 'coc_characters_'+_dateStamp()+'.zip');
    showToast(allChars.length+'件をZIP出力しました');
  }catch(e){ showToast('ZIP生成に失敗しました'); console.warn(e); }
}
// 全PCを閲覧モード画面のPDFにして一括ZIPダウンロード
async function exportAllPDF(){
  if(!allChars.length){showToast('データがありません');return;}
  if(typeof JSZip==='undefined'){showToast('ZIPライブラリを読み込めませんでした');return;}
  const zip=new JSZip();
  const used={};
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;width:900px;height:1400px;left:-4000px;top:0;border:0;visibility:hidden';
  document.body.appendChild(iframe);
  const loadView=(url)=>new Promise(res=>{ iframe.onload=()=>res(); iframe.src=url+'&_='+Date.now()+Math.random(); });
  const waitReady=()=>new Promise(res=>{ const t0=Date.now(); const chk=()=>{ try{const w=iframe.contentWindow; if(w&&w.__viewReady&&w.__makePDFBlob)return res(true);}catch(_){ } if(Date.now()-t0>30000)return res(false); setTimeout(chk,100); }; chk(); });
  let okc=0,errc=0;
  showToast('PDF生成中... (0/'+allChars.length+')');
  for(let i=0;i<allChars.length;i++){
    const c=allChars[i];
    try{
      await loadView(viewUrlFor(c.id));
      const ready=await waitReady();
      if(!ready){ errc++; showToast('PDF生成中... ('+(i+1)+'/'+allChars.length+')'); continue; }
      await new Promise(r=>setTimeout(r,450));        // 画像読込・レイアウト安定待ち
      const {blob,name}=await iframe.contentWindow.__makePDFBlob();
      let nm=((name||c.char_name||'character')+'').trim().replace(/[\\/:*?"<>|\n\r\t]/g,'_')||'character';
      let fn=nm,k=2; while(used[fn]){fn=nm+'_'+k;k++;} used[fn]=1;
      zip.file(fn+'.pdf', blob);
      okc++;
    }catch(e){ errc++; console.warn('pdf err',c.id,e); }
    showToast('PDF生成中... ('+(i+1)+'/'+allChars.length+')');
  }
  iframe.remove();
  try{
    const blob=await zip.generateAsync({type:'blob'});
    _downloadBlob(blob,'coc_pdf_'+_dateStamp()+'.zip');
    showToast('PDF一括出力：成功'+okc+'件'+(errc?('／失敗'+errc+'件'):''));
  }catch(e){ showToast('ZIP生成に失敗しました'); console.warn(e); }
}
function exportCSV(){

  const head=['PC名','ふりがな','職業','年齢','性別','状態','SAN','STR','CON','POW','DEX','APP','SIZ','INT','EDU','タグ'];

function editTags(id){
  const char=allChars.find(c=>c.id===id); if(!char)return;

function renderTeChips(){

  const set=new Set([...allTagsUnion(), ...getTagOrder(), ..._teSelected]);
  if(set.size===0){wrap.innerHTML='<span class="te-empty">既存のタグはありません。下の欄から追加してください。</span>';return;}
  const order=getTagOrder();
  const all=[...set].sort((a,b)=>{

    if(ia!==-1&&ib!==-1)return ia-ib;
    if(ia!==-1)return -1; if(ib!==-1)return 1;

  });

function teAddNew(){

function teSave(){
  const tags=[..._teSelected];
  if(_teBulk){
    if(tags.length>0){
      bulkApply(s=>{const cur=Array.isArray(s.tags)?s.tags:[];s.tags=[...new Set([...cur,...tags])].slice(0,20);}, '{n}件にタグを追加しました');
    }
    teClose(); return;
  }

  updateCharData(_teId, s=>{ s.tags=tags.slice(0,20); }, 'タグを更新しました');

function openTagManage(){ renderTmList(); document.getElementById('tag_manage_overlay').classList.add('on'); }
function tmClose(){ document.getElementById('tag_manage_overlay').classList.remove('on'); }
function renderTmList(){
  const wrap=document.getElementById('tm_list'); if(!wrap)return;
  const order=getTagOrder();
  const set=new Set([...allTagsUnion(), ...order]);
  const tags=[...set].sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b);
    if(ia!==-1&&ib!==-1)return ia-ib;
    if(ia!==-1)return -1; if(ib!==-1)return 1;

  wrap.innerHTML=tags.map(t=>

     </div>`

function tmAdd(){
  const inp=document.getElementById('tm_new'); if(!inp)return;
  const name=(inp.value||'').trim().replace(/["'\\]/g,'');
  if(!name){ inp.focus(); return; }
  const order=getTagOrder();
  if(new Set([...allTagsUnion(), ...order]).has(name)){ showToast('そのタグは既にあります'); inp.value=''; inp.focus(); return; }
  setTagOrder([...order, name]);
  inp.value='';
  renderTmList(); buildTagFilter();
  showToast('タグ「'+name+'」を追加しました');
  inp.focus();
}
let _tmDragEl=null;
function tmPointerDown(e,tag){
  e.preventDefault();
  _tmDragEl=e.target.closest('.tm-row');
  if(!_tmDragEl)return;
  _tmDragEl.classList.add('dragging');
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  window.addEventListener('pointermove',tmPointerMove);
  window.addEventListener('pointerup',tmPointerUp,{once:true});
}
function tmPointerMove(e){
  const list=document.getElementById('tm_list'); if(!list||!_tmDragEl)return;
  const rows=[...list.querySelectorAll('.tm-row')];
  const y=e.clientY;
  let target=null;
  for(const r of rows){ if(r===_tmDragEl)continue; const rect=r.getBoundingClientRect(); if(y<rect.top+rect.height/2){ target=r; break; } }
  if(target){ if(target!==_tmDragEl.nextSibling) list.insertBefore(_tmDragEl,target); }
  else { list.appendChild(_tmDragEl); }
}
function tmPointerUp(){
  window.removeEventListener('pointermove',tmPointerMove);
  if(_tmDragEl)_tmDragEl.classList.remove('dragging');
  const list=document.getElementById('tm_list');
  if(list){ const order=[...list.querySelectorAll('.tm-row')].map(r=>r.dataset.tag); setTagOrder(order); buildTagFilter(); }
  _tmDragEl=null;
}
async function _tagApplyAll(mutator){
  for(const c of allChars){
    try{
      const {data:row,error}=await db.from('character_sheets').select('data').eq('id',c.id).single();
      if(error)continue;
      let s={};try{s=JSON.parse(row.data)||{};}catch(e){}
      const before=JSON.stringify(s.tags||[]);
      mutator(s);
      if(JSON.stringify(s.tags||[])===before)continue; // 変化なしはスキップ
      const nd=JSON.stringify(s);
      await db.from('character_sheets').update({data:nd}).eq('id',c.id);
      c.data=nd; c._sheet=s;
    }catch(e){console.warn('tag apply err',c.id,e);}
  }
  applyFilters();
}
async function tmRename(inp){
  const orig=inp.dataset.orig;
  const next=(inp.value||'').trim().replace(/["'\\]/g,'');
  if(!next||next===orig){ inp.value=orig; return; }
  await _tagApplyAll(s=>{ if(Array.isArray(s.tags)) s.tags=[...new Set(s.tags.map(t=>t===orig?next:t))]; });
  setTagOrder([...new Set(getTagOrder().map(t=>t===orig?next:t))]);
  buildTagFilter(); renderTmList(); showToast('タグ名を変更しました');
}
async function tmDelete(tag){
  if(!confirm('タグ「'+tag+'」を全キャラから削除しますか？'))return;
  await _tagApplyAll(s=>{ if(Array.isArray(s.tags)) s.tags=s.tags.filter(t=>t!==tag); });
  setTagOrder(getTagOrder().filter(t=>t!==tag));
  buildTagFilter(); renderTmList(); showToast('タグを削除しました');
}

/* ===== スプレッドシートHTML 一括取込（新規キャラとして追加） ===== */
function bulkImportSpreadsheets(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.html,.htm'; input.multiple=true;
  input.onchange=async e=>{
    const files=[...e.target.files]; if(!files.length)return;
    if(!confirm(files.length+'件のHTMLを新規キャラとして取り込みます。よろしいですか？'))return;
    showToast('取込中... (0/'+files.length+')');
    let okc=0, errc=0;
    const iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;width:1200px;height:900px;left:-3000px;top:0;border:0;visibility:hidden';
    document.body.appendChild(iframe);
    const loadIframe=()=>new Promise(res=>{ iframe.onload=()=>res(); iframe.src='sheet.html?bulkimport=1&_='+Date.now()+Math.random(); });
    const waitReady=()=>new Promise(res=>{
      const t0=Date.now();
      const chk=()=>{
        try{ const w=iframe.contentWindow; if(w&&w.__bulkReady&&w.parseSpreadsheetHTML&&w.collectData)return res(true);}catch(_){}
        if(Date.now()-t0>20000)return res(false);
        setTimeout(chk,80);
      };
      chk();
    });
    try{
      const {data:{user}}=await db.auth.getUser();
      if(!user){showToast('ログインが必要です');iframe.remove();return;}
      for(let i=0;i<files.length;i++){
        const f=files[i];
        let text=''; try{ text=await f.text(); }catch(_){ errc++; continue; }
        await loadIframe();                 // ファイルごとに再読込してキャリーオーバー防止
        const ready=await waitReady();
        if(!ready){ errc++; continue; }
        try{
          iframe.contentWindow.alert=()=>{};            // 取込完了アラートを抑制
          iframe.contentWindow.parseSpreadsheetHTML(text);
          await new Promise(r=>setTimeout(r,120));        // 行追加等の反映待ち
          const dataStr=iframe.contentWindow.collectData();
          let pcname='名無し';
          try{ pcname=(JSON.parse(dataStr).inputs||{}).pcname||'名無し'; }catch(_){}
          const {error}=await db.from('character_sheets').insert({user_id:user.id,char_name:pcname,data:dataStr});
          if(error){ errc++; console.warn('insert err',f.name,error); } else okc++;
        }catch(err){ errc++; console.warn('parse err',f.name,err); }
        showToast('取込中... ('+(i+1)+'/'+files.length+')');
      }
    }catch(e){ console.warn(e); }
    iframe.remove();
    await loadList();
    showToast('取込完了：成功'+okc+'件'+(errc?('／失敗'+errc+'件'):''));
  };
  input.click();
}

function makeCard(char){
  let sheet={};try{sheet=JSON.parse(char.data);}catch(e){}

  if(gender)metaParts.push({label:'性別：',value:gender});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fixDropboxUrlIndex(url) {
  if (!url) return '';
  if (url.includes('dropbox.com')) {
    let u = url.replace('www.dropbox.com','dl.dropboxusercontent.com').replace('dropbox.com','dl.dropboxusercontent.com');
    u=u.replace(/([?&])dl=[01]/,'$1raw=1');
    if(!/[?&]raw=1/.test(u))u+=(u.includes('?')?'&':'?')+'raw=1';
    return u;
  }
  return url;
}
// いあきゃら(iaproject.app)のURLは画像直リンク形式 https://image.iaproject.app/<uuid> に変換（ココフォリアで画像表示できるように）
function toIaprojectImageUrl(url){
  if(!url) return url;
  if(/iaproject\.app/i.test(url)){
    const m=url.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
    if(m) return 'https://image.iaproject.app/'+m[0];
  }
  return url;
}

function _getCocoStats(inp) {
  const n = k => parseInt(inp[k]||0)||0;
  const str=n('str')+n('str_m')+n('str_t');
  const con=n('con')+n('con_m')+n('con_t');
  const pow=n('pow')+n('pow_m')+n('pow_t');
  const dex=n('dex')+n('dex_m')+n('dex_t');
  const app=n('app')+n('app_m')+n('app_t');
  const siz=n('siz')+n('siz_m')+n('siz_t');
  const int_c=n('int_v')+n('int_m')+n('int_t');
  const edu=n('edu')+n('edu_m')+n('edu_t');
  return {str,con,pow,dex,app,siz,int_c,edu};
}

function _getSkillBase(def, stats) {
  if (def.dyn === 'dex2') return stats.dex * 2;
  if (def.dyn === 'edu5') return stats.edu * 5;
  return def.b || 0;
}

function _getSkillTotal(key, skills, stats) {
  const s = skills.find(x => x.key === key);
  if (!s) return 0;
  const base = (() => {
    for (const cat of Object.values(_SKILLS_DEF)) {
      const d = cat.find(x => x.k === key);
      if (d) return _getSkillBase(d, stats);
    }
    return 0;
  })();
  return base + (parseInt(s.job)||0) + (parseInt(s.int)||0) + (parseInt(s.grw)||0) + (parseInt(s.oth)||0);
}

  const sectionOrder = ['combat', null, 'search', 'action', 'talk', 'know'];

  sectionOrder.forEach(sec => {
    if (sec === null) {
      // 武器テーブル
      weapons.forEach(w => {
        const vals = Array.isArray(w) ? w : (w.vals || []);
        const db = typeof w === 'object' && !Array.isArray(w) ? (w.db || false) : false;
        const wName = vals[0]; const wPct = parseInt(vals[1])||0;
        const wDmg = vals[2];
        if (!wName || !wPct) return;
        lines.push(`CCB<=${wPct} 【${wName}】`);
        if (wDmg) lines.push(`${db ? wDmg+'{DB}' : wDmg} 【${wName}】ダメージ`);
      });
      return;
    }

    const defs = _SKILLS_DEF[sec] || [];
    defs.forEach(def => {
      const key = def.k;
      const base = _getSkillBase(def, stats);
      const total = _getSkillTotal(key, skills, stats);
      if (total <= base && !alwaysKeys.has(key)) return;

      const sk = skills.find(x => x.key === key);
      const label = (sk && sk.freeVal) ? def.n + '(' + sk.freeVal + ')' : def.n;
      if (weaponNames.has(label)) return; // 武器と重複する技能表の技能は出さない（武器側を優先）
      const isGun = _GUN_KEYS.includes(key);
      const isMelee = key in _MELEE;
      const isMa = key === 'ma';

      if (isGun && total > base) {
        const jamNo = _getGunJamNo(total);
        lines.push(`CCB(${jamNo})<=${total} 【${label}】`);
      } else {
        lines.push(`CCB<=${total} 【${label}】`);
      }

      if (key === 'firstaid') lines.push(`1D3 【応急手当】回復`);
      if (sec === 'combat' && isMelee && total > base) {
        const dmg = _MELEE[key];
        if (dmg && dmg !== '特殊') lines.push(`${dmg} 【${label}】ダメージ`);
      }
      if (isMa && total > base) lines.push(`1D3{DB} 【武道(MA)】ダメージ`);
      if (maTotal > 1 && _MA_COMBO.includes(key) && total > base) {
        const ck = `ma_${key}`;
        if (!comboAdded.has(ck)) {
          comboAdded.add(ck);
          lines.push(`CBRB(${maTotal},${total}) 【武道(MA)】+【${label}】`);
          lines.push(`2D6{DB} 【武道(MA)】+【${label}】ダメージ`);
        }
      }
    });
  });

  // カスタム追加技能（custom_xxx キー）
  skills.forEach(s => {
    if (!s.key || !s.key.startsWith('custom_')) return;
    const name = (s.freeVal || '').trim();
    if (!name) return; // 名前未入力はスキップ
    if (weaponNames.has(name)) return; // 武器と重複する技能は出さない
    const base = parseInt(s.base) || 0;
    const total = base + (parseInt(s.job)||0) + (parseInt(s.int)||0) + (parseInt(s.grw)||0) + (parseInt(s.oth)||0);
    if (total <= base) return; // 初期値超えのみ出力
    lines.push(`CCB<=${total} 【${name}】`);
  });

  lines.push(`CCB<={STR}*5 【STR】`);
  lines.push(`CCB<={CON}*5 【CON】`);
  lines.push(`CCB<={POW}*5 【POW】`);
  lines.push(`CCB<={DEX}*5 【DEX】`);
  lines.push(`CCB<={APP}*5 【APP】`);
  lines.push(`CCB<={SIZ}*5 【SIZ】`);
  lines.push(`CCB<={INT}*5 【INT】`);
  lines.push(`CCB<={EDU}*5 【EDU】`);

  return lines.join('\n');
}

function _buildCocoJSON(sheet) {
  const inp = sheet.inputs || {};
  const stats = _getCocoStats(inp);
  const pcname = inp.pcname || 'キャラクター';
  const txtcolor = inp.txtcolor || '#000000';
  const san_now = parseInt(inp.san_now)||0;
  const max_san = san_now; // コマ出力は現在SAN＝最大SAN
  const hp = Math.ceil((stats.con + stats.siz) / 2);
  const mp = stats.pow;
  const iconUrl = inp.charImage ? toIaprojectImageUrl(fixDropboxUrlIndex(inp.charImage)) : '';

  return {
    kind: 'character',
    formatVersion: 1,
    data: {
      name: pcname,
      initiative: stats.dex,
      externalUrl: '',
      iconUrl: iconUrl,
      status: [
        {label:'HP', value: hp, max: hp},
        {label:'MP', value: mp, max: mp},
        {label:'SAN', value: san_now, max: max_san},
      ],
      params: [
        {label:'STR',value:String(stats.str)},{label:'CON',value:String(stats.con)},
        {label:'POW',value:String(stats.pow)},{label:'DEX',value:String(stats.dex)},
        {label:'APP',value:String(stats.app)},{label:'SIZ',value:String(stats.siz)},
        {label:'INT',value:String(stats.int_c)},{label:'EDU',value:String(stats.edu)},
        {label:'DB',value:(()=>{const ss=stats.str+stats.siz;return ss<=12?'-1D6':ss<=16?'-1D4':ss<=24?'0':ss<=32?'+1D4':ss<=40?'+1D6':'+2D6';})()},
      ],
      commands: _buildChatPalette(sheet),
      memo: '',
      secret: false,
      color: txtcolor || '#000000',
    }
  };
}

async function openCocoFromIndex(id) {
  const { data, error } = await db.from('character_sheets').select('data').eq('id', id).single();
  if (error || !data) { alert('データが見つかりません'); return; }
  _cocoSheet = JSON.parse(data.data);

  const palette = _buildChatPalette(_cocoSheet);
  const old = document.getElementById('cocofolia_modal');
  if (old) old.remove();

  const modal = document.createElement('div');
  modal.id = 'cocofolia_modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div id="cocofolia_dialog" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;width:min(480px,92vw);box-shadow:0 4px 20px rgba(0,0,0,.5)">
    <div style="font-weight:bold;font-size:12px;color:var(--text);margin-bottom:6px">🐔 駒出力 - ${(_cocoSheet.inputs?.pcname||'')}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">📝 チャットパレット（プレビュー・編集可）</div>
    <textarea id="coco_palette_preview" style="width:100%;height:220px;font-size:11px;font-family:monospace;border:1px solid var(--border);padding:4px;resize:vertical;background:var(--surface2);color:var(--text)">${palette}</textarea>
    <div id="coco_copy_msg" style="font-size:11px;color:#2a7;display:none;margin:6px 0">✓ クリップボードにコピーしました！</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text)">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" id="coco_secret_check" style="width:14px;height:14px;cursor:pointer">
        非公開（secret）にする
      </label>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button onclick="document.getElementById('cocofolia_modal').remove()" style="font-size:11px;padding:3px 12px;cursor:pointer;background:#aaa;color:#fff;border:none;border-radius:2px">閉じる</button>
      <button onclick="_doCocoCopy()" style="font-size:11px;padding:3px 16px;cursor:pointer;background:#7755aa;color:#fff;border:none;border-radius:2px;font-weight:bold">📋 コマJSONをコピー</button>
    </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function _doCocoCopy() {
  if (!_cocoSheet) return;
  const palette = document.getElementById('coco_palette_preview')?.value || _buildChatPalette(_cocoSheet);
  const json = _buildCocoJSON(_cocoSheet);
  json.data.commands = palette;
  json.data.secret = document.getElementById('coco_secret_check')?.checked || false;
  navigator.clipboard.writeText(JSON.stringify(json, null, 2)).then(() => {
    const msg=document.getElementById('coco_copy_msg');
    if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',3000);}
  }).catch(() => alert('コピーに失敗しました'));
}
